<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Nun — Storage Layout</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0c;--card:#1a1a1e;--card2:#222226;--border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.15);--text:#f5f5f7;--text2:rgba(245,245,247,0.6);
  --text3:rgba(245,245,247,0.35);--red:#FF453A;--green:#30D158;--blue:#0A84FF;
  --orange:#FF9F0A;--purple:#BF5AF2;--yellow:#FFD60A;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* Header */
.hdr{position:sticky;top:0;z-index:100;padding:16px 24px;background:rgba(10,10,12,0.9);
  backdrop-filter:blur(30px);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between}
.hdr-left{display:flex;align-items:center;gap:12px}
.hdr-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--red),#FF6259);
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:13px;color:#fff}
.hdr-title{font-size:18px;font-weight:700}
.hdr-sub{font-size:11px;color:var(--text3);font-weight:500}
.hdr-right{display:flex;gap:10px;align-items:center}
.btn{padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;
  border:none;transition:all 0.15s}
.btn-primary{background:var(--red);color:#fff}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn:hover{filter:brightness(1.1)}
a.btn{text-decoration:none;display:inline-flex;align-items:center}

/* Layout */
.layout{display:flex;height:calc(100vh - 65px)}

/* Left: Storage locations */
.sidebar{width:280px;border-right:1px solid var(--border);overflow-y:auto;background:var(--card)}
.loc-header{padding:16px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;
  color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;
  display:flex;justify-content:space-between;align-items:center}
.add-area-btn{background:rgba(10,132,255,0.12);color:var(--blue);border:1px solid rgba(10,132,255,0.3);
  border-radius:7px;font-size:11px;font-weight:700;padding:5px 10px;cursor:pointer;
  text-transform:none;letter-spacing:0;transition:all 0.15s}
.add-area-btn:hover{background:rgba(10,132,255,0.2)}
.loc-item{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;transition:all 0.15s}
.loc-item:hover{background:rgba(255,255,255,0.03)}
.loc-item.active{background:rgba(10,132,255,0.1);border-left:3px solid var(--blue)}
.loc-item.unassigned{background:rgba(255,69,58,0.08);border-left:3px solid var(--red)}
.loc-item.unassigned.active{background:rgba(255,69,58,0.15)}
.loc-name{font-size:14px;font-weight:600}
.loc-count{font-size:12px;color:var(--text3);font-weight:600;background:var(--card2);
  padding:2px 8px;border-radius:10px}
.loc-count.warn{background:rgba(255,69,58,0.15);color:var(--red)}
.loc-right{display:flex;align-items:center;gap:8px}
.loc-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;
  padding:2px 7px;border-radius:6px;line-height:1;opacity:0.45;transition:all 0.15s}
.loc-del:hover{color:var(--red);background:rgba(255,69,58,0.12);opacity:1}

/* Restaurant toggle */
.rest-toggle{display:flex;gap:4px;padding:12px 16px;border-bottom:1px solid var(--border)}
.rest-btn{flex:1;padding:8px;border-radius:8px;background:var(--card2);border:1.5px solid var(--border);
  color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all 0.15s}
.rest-btn.sel{border-color:var(--red);background:rgba(255,69,58,0.1);color:var(--red)}

/* Food / Booze type filter */
.type-filter{display:flex;gap:6px;margin-bottom:14px}
.tf-btn{padding:8px 16px;border-radius:8px;background:var(--card2);border:1.5px solid var(--border);
  color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s}
.tf-btn.sel{border-color:var(--blue);background:rgba(10,132,255,0.12);color:var(--blue)}

/* Shelves (sub-sections within an area) */
.shelf-header{display:flex;justify-content:space-between;align-items:center;margin:18px 0 8px;
  padding-bottom:6px;border-bottom:1px solid var(--border)}
.shelf-name{font-size:14px;font-weight:700;color:var(--blue)}
.shelf-empty{padding:6px 4px 10px;color:var(--text3);font-size:12px}
.shelf-select{background:var(--card2);border:1px solid var(--border);color:var(--text);
  border-radius:8px;font-size:12px;font-weight:600;padding:7px 8px;cursor:pointer;flex-shrink:0;max-width:140px}
.shelf-select:focus{border-color:var(--blue);outline:none}
.add-shelf-row{display:flex;justify-content:flex-end;margin-bottom:6px}

/* Link from a product to its edit page */
.prod-link{color:inherit;text-decoration:none}
.prod-link:hover{color:var(--blue);text-decoration:underline}
.prod-link .ext{color:var(--text3);font-size:10px;margin-left:3px}

/* In-page product edit panel */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:300;padding:20px}
.modal-ov.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:440px;padding:22px;max-height:90vh;overflow-y:auto}
.modal h3{font-size:17px;font-weight:700;margin-bottom:4px}
.modal .msub{font-size:12px;color:var(--text3);margin-bottom:16px}
.fld{margin-bottom:12px}
.fld label{display:block;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px}
.fld input,.fld select{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 10px;font-size:14px;outline:none}
.fld input:focus,.fld select:focus{border-color:var(--blue)}
.modal-row{display:flex;gap:10px}.modal-row .fld{flex:1}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.modal-actions button{flex:1;padding:11px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;border:none}
.btn-save{background:var(--green);color:#000}
.btn-cancel{background:var(--card2);color:var(--text2);border:1px solid var(--border)}

/* Right: Product list */
.main{flex:1;overflow-y:auto;padding:20px 24px}
.main-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.main-title{font-size:20px;font-weight:700}
.main-sub{font-size:13px;color:var(--text2);margin-top:2px}

.search-bar{padding:10px 14px;background:var(--card);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:14px;width:280px;outline:none}
.search-bar:focus{border-color:var(--blue)}

/* Product cards in storage location */
.product-card{display:flex;align-items:center;gap:12px;padding:12px 14px;
  background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;
  cursor:grab;transition:all 0.15s;user-select:none}
.product-card:active{cursor:grabbing}
.product-card.dragging{opacity:0.5;border-color:var(--blue)}
.product-card.drag-over{border-color:var(--green);background:rgba(48,209,88,0.05)}
.drag-handle{color:var(--text3);font-size:16px;cursor:grab;padding:0 4px;flex-shrink:0}
.pc-info{flex:1;min-width:0}
.pc-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-meta{font-size:11px;color:var(--text3);margin-top:2px}
.pc-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;
  display:inline-block}
.tag-beer{background:rgba(255,159,10,0.15);color:var(--orange)}
.tag-liquor{background:rgba(255,69,58,0.15);color:var(--red)}
.tag-wine{background:rgba(191,90,242,0.15);color:var(--purple)}
.tag-food{background:rgba(48,209,88,0.15);color:var(--green)}
.tag-na_beverages{background:rgba(10,132,255,0.15);color:var(--blue)}
.tag-other,.tag-supplies{background:rgba(255,255,255,0.08);color:var(--text3)}
.pc-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;
  padding:4px 8px;border-radius:6px;transition:all 0.15s;flex-shrink:0}
.pc-remove:hover{color:var(--red);background:rgba(255,69,58,0.1)}
.pc-order{font-size:10px;color:var(--text3);font-weight:700;width:22px;text-align:center;flex-shrink:0}

/* Unassigned product list */
.unassigned-card{display:flex;align-items:center;gap:12px;padding:10px 14px;
  background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:4px;
  transition:all 0.15s}
.unassigned-card:hover{border-color:var(--border2)}
.assign-btn{padding:6px 12px;border-radius:6px;background:rgba(10,132,255,0.12);
  color:var(--blue);font-size:11px;font-weight:700;border:1px solid rgba(10,132,255,0.3);
  cursor:pointer;flex-shrink:0;transition:all 0.15s}
.assign-btn:hover{background:rgba(10,132,255,0.2)}

/* Empty state */
.empty{padding:40px 20px;text-align:center;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:8px;opacity:0.4}
.empty-text{font-size:14px;line-height:1.5}

/* Toast */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:var(--green);color:#000;padding:10px 20px;border-radius:10px;font-size:13px;
  font-weight:700;opacity:0;transition:all 0.3s;z-index:200;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{background:var(--red);color:#fff}

/* Badge for unassigned count */
.unassigned-badge{display:inline-block;background:var(--red);color:#fff;font-size:10px;
  font-weight:800;padding:2px 7px;border-radius:8px;margin-left:6px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-logo">RN</div>
    <div>
      <div class="hdr-title">Storage Layout</div>
      <div class="hdr-sub">ASSIGN PRODUCTS → DRAG TO REORDER</div>
    </div>
  </div>
  <div class="hdr-right">
    <a href="/count" class="btn btn-primary">📋 Count Inventory</a>
    <a href="/manage" class="btn btn-secondary">← Manage</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- In-page product editor -->
<div class="modal-ov" id="edit-ov" onclick="if(event.target===this)closeEdit()">
  <div class="modal">
    <h3 id="edit-title">Edit product</h3>
    <div class="msub">Changes save to the product catalog.</div>
    <div class="fld"><label>Display name</label><input id="ed-display"></div>
    <div class="fld"><label>Full name</label><input id="ed-name"></div>
    <div class="modal-row">
      <div class="fld"><label>Category</label><select id="ed-cat">
        <option value="FOOD">Food</option><option value="BEER">Beer</option><option value="LIQUOR">Liquor</option>
        <option value="WINE">Wine</option><option value="NA_BEVERAGES">NA Beverages</option><option value="SUPPLIES">Supplies</option>
      </select></div>
      <div class="fld"><label>Unit</label><input id="ed-unit"></div>
    </div>
    <div class="modal-row">
      <div class="fld"><label>Price ($)</label><input id="ed-price" type="number" step="0.01"></div>
      <div class="fld"><label>Par</label><input id="ed-par" type="number" step="0.5"></div>
      <div class="fld"><label>Reorder</label><input id="ed-reorder" type="number" step="0.5"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
      <button class="btn-save" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

<div class="layout">
  <!-- Sidebar: Storage Locations -->
  <div class="sidebar">
    <div class="rest-toggle">
      <button class="rest-btn sel" data-loc="dennis" onclick="pickRest(this)">Dennis Port</button>
      <button class="rest-btn" data-loc="chatham" onclick="pickRest(this)">Chatham</button>
    </div>
    <div class="loc-header"><span>Storage Areas</span><button class="add-area-btn" onclick="addArea()">+ Add Area</button></div>
    <div id="loc-list"></div>
  </div>

  <!-- Main: Products in selected location -->
  <div class="main">
    <div class="main-header">
      <div>
        <div class="main-title" id="main-title">Select a storage area</div>
        <div class="main-sub" id="main-sub">Click a location on the left to manage its products</div>
      </div>
      <input class="search-bar" id="search" placeholder="Search products..." oninput="renderMain()">
    </div>
    <div class="type-filter">
      <button class="tf-btn sel" data-type="all" onclick="pickType(this)">All</button>
      <button class="tf-btn" data-type="booze" onclick="pickType(this)">🍸 Booze</button>
      <button class="tf-btn" data-type="food" onclick="pickType(this)">🍴 Food</button>
    </div>
    <div id="main-content"></div>
  </div>
</div>

<script>
const API = '/api/storage';
const S = { restaurant: 'dennis', locations: [], selectedLoc: null, unassignedCount: 0, typeFilter: 'all' };
const BOOZE_CATS = ['BEER', 'LIQUOR', 'WINE'];

// ============================================
// FOOD / BOOZE TYPE FILTER
// ============================================
function inType(cat) {
  if (S.typeFilter === 'all') return true;
  const isBooze = BOOZE_CATS.includes((cat || '').toUpperCase());
  return S.typeFilter === 'booze' ? isBooze : !isBooze;
}
function pickType(el) {
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  S.typeFilter = el.dataset.type;
  renderMain();
}

// ============================================
// RESTAURANT TOGGLE
// ============================================
function pickRest(el) {
  document.querySelectorAll('.rest-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  S.restaurant = el.dataset.loc;
  S.selectedLoc = null;
  loadLocations();
}

// ============================================
// ADD AREA
// ============================================
async function addArea() {
  const restLabel = S.restaurant === 'dennis' ? 'Dennis Port' : 'Chatham';
  const name = (prompt('New storage area name for ' + restLabel + ':\n(e.g. Back Freezer, Shed Freezer, Back Shelves)') || '').trim();
  if (!name) return;

  // Guard against a duplicate name already shown for this restaurant
  if (S.locations.some(l => l.name.toLowerCase() === name.toLowerCase())) {
    showToast('"' + name + '" already exists', true);
    return;
  }

  try {
    const res = await fetch(API + '/locations', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ name, location: S.restaurant })
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      showToast(data.error || 'Could not add area', true);
      return;
    }
    showToast('✓ Added "' + name + '" to ' + restLabel);
    // Jump straight into the new area so items can be assigned to it
    if (data.id) S.selectedLoc = data.id;
    await loadLocations();
  } catch(e) {
    showToast('Error adding area', true);
  }
}

// ============================================
// DELETE AREA
// ============================================
async function deleteArea(locId, locName, cnt) {
  let msg = 'Delete area "' + locName + '"?';
  if (cnt > 0) msg += '\n\nIts ' + cnt + ' item(s) will go back to Unassigned — the products themselves are not deleted.';
  if (!confirm(msg)) return;

  try {
    const res = await fetch(API + '/locations/' + locId, { method: 'DELETE' });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      showToast(data.error || 'Could not delete area', true);
      return;
    }
    showToast('Deleted "' + locName + '"');
    if (S.selectedLoc === locId) S.selectedLoc = null;
    await loadLocations();
  } catch(e) {
    showToast('Error deleting area', true);
  }
}

// ============================================
// LOAD LOCATIONS
// ============================================
async function loadLocations() {
  try {
    const [locsRes, unRes] = await Promise.all([
      fetch(API + '/locations'),
      fetch(API + '/unassigned?location=' + S.restaurant)
    ]);
    const allLocs = await locsRes.json();
    const unassigned = await unRes.json();
    
    // Filter to current restaurant
    S.locations = allLocs.filter(l => l.location === S.restaurant);
    S.unassignedCount = unassigned.length;
    
    // Get product counts for each location
    const counts = await Promise.all(
      S.locations.map(l => fetch(API + '/locations/' + l.id + '/products').then(r => r.json()))
    );
    
    const list = document.getElementById('loc-list');
    
    // Unassigned item at top
    let html = '<div class="loc-item unassigned' + (S.selectedLoc === 'unassigned' ? ' active' : '') + '" onclick="selectUnassigned()">' +
      '<div class="loc-name">⚠️ Unassigned' + (S.unassignedCount > 0 ? '<span class="unassigned-badge">' + S.unassignedCount + '</span>' : '') + '</div>' +
      '<div class="loc-count' + (S.unassignedCount > 0 ? ' warn' : '') + '">' + S.unassignedCount + '</div>' +
    '</div>';
    
    S.locations.forEach((loc, i) => {
      const cnt = counts[i].length;
      const safeName = esc(loc.name).replace(/'/g, "\\'");
      html += '<div class="loc-item' + (S.selectedLoc === loc.id ? ' active' : '') + '" onclick="selectLoc(' + loc.id + ',\'' + safeName + '\')">' +
        '<div class="loc-name">' + esc(loc.name) + '</div>' +
        '<div class="loc-right">' +
          '<div class="loc-count">' + cnt + '</div>' +
          '<button class="loc-del" title="Delete area" onclick="event.stopPropagation();deleteArea(' + loc.id + ',\'' + safeName + '\',' + cnt + ')">✕</button>' +
        '</div>' +
      '</div>';
    });
    
    list.innerHTML = html;
    
    // Auto-show unassigned if nothing selected and there are unassigned items
    if (!S.selectedLoc && S.unassignedCount > 0) {
      selectUnassigned();
    } else if (S.selectedLoc === 'unassigned') {
      selectUnassigned();
    } else if (S.selectedLoc) {
      const loc = S.locations.find(l => l.id === S.selectedLoc);
      if (loc) selectLoc(loc.id, loc.name);
    }
  } catch(e) {
    console.error('Failed to load locations:', e);
  }
}

// ============================================
// SELECT LOCATION
// ============================================
async function selectLoc(locId, locName) {
  S.selectedLoc = locId;
  document.getElementById('main-title').textContent = locName;
  document.getElementById('main-sub').textContent = 'Add shelves • use each item\'s dropdown to place it • ✕ removes from area';
  document.getElementById('search').value = '';
  
  // Highlight active in sidebar
  document.querySelectorAll('.loc-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.loc-item').forEach(el => {
    if (el.onclick && el.onclick.toString().includes(locId)) el.classList.add('active');
  });
  
  await renderLocationProducts(locId);
}

async function renderLocationProducts(locId) {
  const [pRes, sRes] = await Promise.all([
    fetch(API + '/locations/' + locId + '/products'),
    fetch(API + '/locations/' + locId + '/sections')
  ]);
  let products = await pRes.json();
  const sections = await sRes.json();

  products = products.filter(p => inType(p.category));
  const search = (document.getElementById('search').value || '').toLowerCase();
  if (search) products = products.filter(p => p.name.toLowerCase().includes(search));

  const main = document.getElementById('main-content');

  // "+ Add Shelf" action (always available for an area)
  let html = '<div class="add-shelf-row"><button class="add-area-btn" onclick="addShelf(' + locId + ')">+ Add Shelf</button></div>';

  if (products.length === 0) {
    html += '<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">' +
      (search ? 'No products match your search.'
              : 'No products in this area yet.<br>Select "Unassigned" to add products.') +
      '</div></div>';
    main.innerHTML = html;
    return;
  }

  // Build the shelf <option> list (shared)
  function shelfOptions(selId) {
    let o = '<option value=""' + (!selId ? ' selected' : '') + '>— Unshelved —</option>';
    sections.forEach(s => {
      o += '<option value="' + s.id + '"' + (selId === s.id ? ' selected' : '') + '>' + esc(s.name) + '</option>';
    });
    return o;
  }

  // Group: each shelf in order, then an Unshelved bucket
  const groups = sections.map(s => ({ id: s.id, name: s.name, items: products.filter(p => p.section_id === s.id) }));
  groups.push({ id: null, name: 'Unshelved', items: products.filter(p => !p.section_id) });

  groups.forEach(g => {
    if (g.id === null && g.items.length === 0) return; // hide empty Unshelved
    html += '<div class="shelf-header">' +
      '<span class="shelf-name">' + esc(g.name) + ' <span style="color:var(--text3);font-weight:600">(' + g.items.length + ')</span></span>' +
      (g.id !== null ? '<button class="loc-del" title="Delete shelf" onclick="deleteShelf(' + g.id + ',' + locId + ',\'' + esc(g.name).replace(/'/g, "\\'") + '\')">✕</button>' : '') +
    '</div>';

    if (g.items.length === 0) {
      html += '<div class="shelf-empty">No items here yet — use a product\'s dropdown to move it onto this shelf.</div>';
      return;
    }

    g.items.forEach(p => {
      const tagClass = 'tag-' + (p.category || 'other').toLowerCase();
      html += '<div class="product-card" style="cursor:default">' +
        '<div class="pc-info">' +
          '<div class="pc-name"><a class="prod-link" href="/manage?product=' + p.id + '" onclick="openEdit(' + p.id + ');return false" title="Edit this product">' + esc(p.name) + '<span class="ext">✎</span></a></div>' +
          '<div class="pc-meta"><span class="pc-tag ' + tagClass + '">' + catLabel(p.category) + '</span> ' +
            (p.current_price ? '$' + Number(p.current_price).toFixed(2) + '/' + (p.unit || 'ea') : '') +
          '</div>' +
        '</div>' +
        '<select class="shelf-select" onchange="assignToShelf(' + p.assignment_id + ',this.value,' + locId + ')">' + shelfOptions(p.section_id) + '</select>' +
        '<button class="pc-remove" onclick="removeProduct(' + locId + ',' + p.id + ')" title="Remove from this area">✕</button>' +
      '</div>';
    });
  });

  main.innerHTML = html;
}

// ============================================
// SHELVES (sub-sections within an area)
// ============================================
async function addShelf(locId) {
  const name = (prompt('New shelf name (e.g. "Shelf 3"):') || '').trim();
  if (!name) return;
  try {
    const res = await fetch('/api/inventory/count/sections', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ storage_location_id: locId, name })
    });
    if (!res.ok) { showToast('Could not add shelf', true); return; }
    showToast('✓ Added "' + name + '"');
    renderLocationProducts(locId);
  } catch(e) { showToast('Error adding shelf', true); }
}

async function deleteShelf(sectionId, locId, name) {
  if (!confirm('Delete shelf "' + name + '"?\n\nIts items stay in the area but become Unshelved.')) return;
  try {
    const res = await fetch('/api/inventory/count/sections/' + sectionId, { method: 'DELETE' });
    if (!res.ok) { showToast('Could not delete shelf', true); return; }
    showToast('Deleted "' + name + '"');
    renderLocationProducts(locId);
  } catch(e) { showToast('Error deleting shelf', true); }
}

async function assignToShelf(assignmentId, sectionId, locId) {
  try {
    await fetch('/api/inventory/count/assign-section', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ psl_id: assignmentId, section_id: sectionId ? parseInt(sectionId) : null })
    });
    showToast('Moved');
    renderLocationProducts(locId);
  } catch(e) { showToast('Error moving item', true); }
}

// ============================================
// UNASSIGNED
// ============================================
async function selectUnassigned() {
  S.selectedLoc = 'unassigned';
  document.getElementById('main-title').textContent = '⚠️ Unassigned Products';
  document.getElementById('main-sub').textContent = 'These products need a storage location • Click a location button to assign';
  document.getElementById('search').value = '';
  
  document.querySelectorAll('.loc-item').forEach(el => el.classList.remove('active'));
  document.querySelector('.loc-item.unassigned')?.classList.add('active');
  
  const res = await fetch(API + '/unassigned?location=' + S.restaurant);
  let products = await res.json();
  products = products.filter(p => inType(p.category));

  const main = document.getElementById('main-content');

  if (products.length === 0) {
    const msg = S.typeFilter === 'all'
      ? 'All products assigned!<br>Great work.'
      : 'No unassigned ' + S.typeFilter + ' products.';
    main.innerHTML = '<div class="empty"><div class="empty-icon">✅</div>' +
      '<div class="empty-text">' + msg + '</div></div>';
    return;
  }
  
  // Group by category
  const cats = {};
  products.forEach(p => {
    const cat = p.category || 'OTHER';
    if (!cats[cat]) cats[cat] = [];
    cats[cat].push(p);
  });
  
  // Location buttons for quick assign
  const locBtns = S.locations.map(l =>
    '<button class="assign-btn" style="margin:2px" onclick="batchAssign(' + l.id + ',this)" data-loc-id="' + l.id + '">' + esc(l.name) + '</button>'
  ).join('');
  
  let html = '<div style="margin-bottom:16px;padding:14px;background:var(--card);border:1px solid rgba(255,69,58,0.2);border-radius:10px">' +
    '<div style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:8px">Select products, then click a storage area to assign:</div>' +
    '<div style="display:flex;flex-wrap:wrap;gap:4px">' + locBtns + '</div>' +
    '<div style="margin-top:8px"><label style="font-size:12px;color:var(--text2);cursor:pointer">' +
      '<input type="checkbox" id="select-all" onchange="toggleSelectAll()" style="margin-right:6px">Select All' +
    '</label></div>' +
  '</div>';
  
  for (const [cat, prods] of Object.entries(cats).sort()) {
    const tagClass = 'tag-' + cat.toLowerCase();
    html += '<div style="font-size:12px;font-weight:700;color:var(--text3);padding:12px 0 6px;text-transform:uppercase">' +
      catLabel(cat) + ' (' + prods.length + ')</div>';
    
    html += prods.map(p =>
      '<div class="unassigned-card">' +
        '<input type="checkbox" class="product-check" value="' + p.id + '" style="flex-shrink:0">' +
        '<div style="flex:1;min-width:0">' +
          '<div style="font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"><a class="prod-link" href="/manage?product=' + p.id + '" onclick="openEdit(' + p.id + ');return false" title="Edit this product">' + esc(p.name) + '<span class="ext">✎</span></a></div>' +
          '<div style="font-size:11px;color:var(--text3)">' +
            (p.current_price ? '$' + Number(p.current_price).toFixed(2) + '/' + (p.unit || 'ea') : '') +
          '</div>' +
        '</div>' +
        '<span class="pc-tag ' + tagClass + '">' + catLabel(cat) + '</span>' +
      '</div>'
    ).join('');
  }
  
  main.innerHTML = html;
}

function toggleSelectAll() {
  const checked = document.getElementById('select-all').checked;
  document.querySelectorAll('.product-check').forEach(cb => cb.checked = checked);
}

async function batchAssign(locId, btn) {
  const checked = [...document.querySelectorAll('.product-check:checked')];
  if (checked.length === 0) {
    showToast('Select products first', true);
    return;
  }
  
  const ids = checked.map(cb => parseInt(cb.value));
  
  try {
    await fetch(API + '/locations/' + locId + '/products/batch', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ product_ids: ids })
    });
    showToast('✓ ' + ids.length + ' products assigned to ' + btn.textContent);
    loadLocations();
  } catch(e) {
    showToast('Error assigning products', true);
  }
}

// ============================================
// REMOVE PRODUCT
// ============================================
async function removeProduct(locId, productId) {
  try {
    await fetch(API + '/locations/' + locId + '/products/' + productId, { method: 'DELETE' });
    showToast('Product removed');
    renderLocationProducts(locId);
    loadLocations(); // Refresh counts
  } catch(e) {
    showToast('Error removing product', true);
  }
}

// ============================================
// DRAG & DROP REORDER
// ============================================
function setupDragDrop(locId) {
  const cards = document.querySelectorAll('.product-card');
  let dragEl = null;
  
  cards.forEach(card => {
    card.addEventListener('dragstart', e => {
      dragEl = card;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    
    card.addEventListener('dragend', () => {
      card.classList.remove('dragging');
      document.querySelectorAll('.product-card').forEach(c => c.classList.remove('drag-over'));
      
      // Save new order
      const newOrder = [...document.querySelectorAll('.product-card')].map(c => parseInt(c.dataset.pid));
      saveOrder(locId, newOrder);
    });
    
    card.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (card !== dragEl) {
        card.classList.add('drag-over');
        const rect = card.getBoundingClientRect();
        const mid = rect.top + rect.height / 2;
        if (e.clientY < mid) {
          card.parentNode.insertBefore(dragEl, card);
        } else {
          card.parentNode.insertBefore(dragEl, card.nextSibling);
        }
      }
    });
    
    card.addEventListener('dragleave', () => {
      card.classList.remove('drag-over');
    });
  });
}

async function saveOrder(locId, productIds) {
  try {
    await fetch(API + '/locations/' + locId + '/reorder', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ product_ids: productIds })
    });
    // Update order numbers
    document.querySelectorAll('.product-card .pc-order').forEach((el, i) => {
      el.textContent = i + 1;
    });
    showToast('Order saved');
  } catch(e) {
    showToast('Error saving order', true);
  }
}

// ============================================
// HELPERS
// ============================================
// ============================================
// IN-PAGE PRODUCT EDIT
// ============================================
let _editId = null, _editRaw = null;
async function openEdit(id) {
  try {
    const p = await fetch('/api/inventory/products/' + id).then(r => r.json());
    _editId = id; _editRaw = p;
    document.getElementById('edit-title').textContent = 'Edit: ' + (p.display_name || p.name || 'Product');
    document.getElementById('ed-display').value = p.display_name || '';
    document.getElementById('ed-name').value = p.name || '';
    const cats = ['FOOD','BEER','LIQUOR','WINE','NA_BEVERAGES','SUPPLIES'];
    document.getElementById('ed-cat').value = cats.includes(p.category) ? p.category : 'FOOD';
    document.getElementById('ed-unit').value = p.unit || '';
    document.getElementById('ed-price').value = p.current_price || '';
    document.getElementById('ed-par').value = p.par_level || '';
    document.getElementById('ed-reorder').value = p.reorder_point || '';
    document.getElementById('edit-ov').classList.add('open');
  } catch(e) { showToast('Could not load product', true); }
}
function closeEdit() {
  document.getElementById('edit-ov').classList.remove('open');
  _editId = null; _editRaw = null;
}
async function saveEdit() {
  if (!_editId) return;
  const r = _editRaw || {};
  const body = {
    display_name: document.getElementById('ed-display').value,
    name: document.getElementById('ed-name').value,
    category: document.getElementById('ed-cat').value,
    unit: document.getElementById('ed-unit').value,
    pack_size: r.pack_size || '',
    inventory_unit: r.inventory_unit || '',
    unit_conversion: r.unit_conversion || 1,
    current_price: document.getElementById('ed-price').value,
    par_level: document.getElementById('ed-par').value,
    reorder_point: document.getElementById('ed-reorder').value,
    notes: r.notes || ''
  };
  try {
    const res = await fetch('/api/inventory/products/' + _editId, {
      method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    if (!res.ok) { showToast('Save failed', true); return; }
    showToast('✓ Saved');
    closeEdit();
    renderMain();
  } catch(e) { showToast('Error saving', true); }
}

function renderMain() {
  if (S.selectedLoc === 'unassigned') {
    selectUnassigned();
  } else if (S.selectedLoc) {
    renderLocationProducts(S.selectedLoc);
  }
}

function catLabel(c) {
  return {BEER:'Beer',LIQUOR:'Liquor',WINE:'Wine',FOOD:'Food',NA_BEVERAGES:'NA Bev',OTHER:'Other',SUPPLIES:'Supplies'}[c] || c;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2000);
}

// Init
loadLocations();
</script>
