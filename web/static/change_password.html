<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password - Red Nun Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/sidebar.css">
<style>
.cp-wrap { max-width: 440px; margin: 48px auto; padding: 0 16px; }
.cp-title { font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 24px; }
.cp-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; padding: 32px; }
.cp-field { display: flex; flex-direction: column; margin-bottom: 18px; }
.cp-field label { font-size: 13px; font-weight: 500; color: #6b7280; margin-bottom: 6px; }
.cp-field input {
  padding: 10px 14px; border: 1px solid #e5e7eb; border-radius: 8px;
  font-size: 14px; color: #111827; background: #fff; font-family: inherit;
}
.cp-field input:focus { outline: none; border-color: #9ca3af; }
.cp-actions { display: flex; gap: 12px; margin-top: 24px; }
.cp-btn {
  padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600;
  cursor: pointer; border: none; font-family: inherit; text-decoration: none;
  display: inline-flex; align-items: center; justify-content: center; transition: opacity 0.12s;
}
.cp-btn:hover { opacity: 0.88; }
.cp-btn-primary { background: linear-gradient(135deg, #dc2626, #ef4444); color: #fff; }
.cp-btn-ghost { background: transparent; border: 1px solid #e5e7eb; color: #374151; }
.cp-msg {
  padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; display: none;
}
.cp-msg.show { display: block; }
.cp-msg-error { background: rgba(220,38,38,0.08); color: #dc2626; border: 1px solid rgba(220,38,38,0.2); }
.cp-msg-success { background: rgba(5,150,105,0.08); color: #059669; border: 1px solid rgba(5,150,105,0.2); }
</style>
</head>
<body>
<div class="cp-wrap">
  <div class="cp-title">Change password</div>
  <div class="cp-card">
    <div class="cp-msg cp-msg-error" id="error"></div>
    <div class="cp-msg cp-msg-success" id="success"></div>
    <form id="cpForm">
      <div class="cp-field">
        <label>Current password</label>
        <input type="password" id="current" required autocomplete="current-password">
      </div>
      <div class="cp-field">
        <label>New password</label>
        <input type="password" id="newpw" required autocomplete="new-password" placeholder="Min. 8 characters">
      </div>
      <div class="cp-field">
        <label>Confirm new password</label>
        <input type="password" id="confirm" required autocomplete="new-password">
      </div>
      <div class="cp-actions">
        <button type="submit" class="cp-btn cp-btn-primary" id="cp-btn">Update password</button>
        <a href="/" class="cp-btn cp-btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
<script src="/static/sidebar.js"></script>
<script>
document.getElementById('cpForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('error');
  const ok = document.getElementById('success');
  const btn = document.getElementById('cp-btn');
  err.classList.remove('show'); ok.classList.remove('show');

  const current_password = document.getElementById('current').value;
  const new_password = document.getElementById('newpw').value;
  const confirm_password = document.getElementById('confirm').value;

  if (new_password !== confirm_password) {
    err.textContent = 'New passwords do not match'; err.classList.add('show'); return;
  }
  if (new_password.length < 8) {
    err.textContent = 'Password must be at least 8 characters'; err.classList.add('show'); return;
  }

  btn.disabled = true; btn.textContent = 'Updating...';
  try {
    const r = await fetch('/api/auth/change-password', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({current_password, new_password})
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Failed');
    ok.textContent = 'Password updated successfully.'; ok.classList.add('show');
    document.getElementById('current').value = '';
    document.getElementById('newpw').value = '';
    document.getElementById('confirm').value = '';
    btn.textContent = 'Updated!';
    setTimeout(() => { btn.textContent = 'Update password'; btn.disabled = false; }, 2000);
  } catch (e) {
    err.textContent = e.message; err.classList.add('show');
    btn.disabled = false; btn.textContent = 'Update password';
  }
});
</script>
</body>
</html>
