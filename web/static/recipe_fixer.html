<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Recipe Cost Fixer — Red Nun</title>
<link rel="stylesheet" href="/static/sidebar.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #020617; --bg-card: #0f172a; --bg-elevated: #1e293b;
  --border: #1e293b; --border-focus: #334155;
  --text: #e2e8f0; --text2: #94a3b8; --text3: #475569;
  --green: #22c55e; --green-soft: rgba(34,197,94,0.12);
  --red: #ef4444; --red-soft: rgba(239,68,68,0.12);
  --blue: #38bdf8; --blue-soft: rgba(56,189,248,0.12);
  --amber: #f59e0b; --amber-soft: rgba(245,158,11,0.12);
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }

.layout { display: flex; height: 100vh; }
.sidebar-container { width: 240px; flex-shrink: 0; }
.main-content { flex: 1; overflow-y: auto; padding: 24px; max-width: 1100px; margin: 0 auto; width: 100%; }

.page-header { display:flex; align-items:flex-end; justify-content:space-between; gap:16px; margin-bottom: 20px; flex-wrap:wrap; }
.page-title { font-size: 22px; font-weight: 700; color: var(--text); }
.page-sub { font-size: 13px; color: var(--text3); margin-top: 4px; }

.progress-bar {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 18px; display: flex; gap: 18px;
  align-items: center; flex-wrap: wrap; margin-bottom: 20px;
}
.progress-bar .stat { font-size: 13px; color: var(--text2); }
.progress-bar .stat b { color: var(--text); font-weight: 700; }
.progress-bar .stat.green b { color: var(--green); }
.progress-bar .stat.amber b { color: var(--amber); }
.progress-bar .stat.red b { color: var(--red); }
.progress-bar .spacer { flex: 1; }
.progress-bar a.review-link {
  color: var(--amber); font-size: 13px; font-weight: 600; text-decoration: none;
  padding: 4px 10px; border: 1px solid var(--amber); border-radius: 6px;
  background: var(--amber-soft); transition: all 0.15s;
}
.progress-bar a.review-link:hover { background: rgba(245,158,11,0.22); }
.progress-bar a.back-link {
  color: var(--blue); font-size: 13px; font-weight: 600; text-decoration: none;
  padding: 4px 10px; border: 1px solid var(--blue); border-radius: 6px;
  background: var(--blue-soft); transition: all 0.15s;
}
.progress-bar a.back-link:hover { background: rgba(56,189,248,0.22); }

.header-controls { display: flex; gap: 8px; align-items: center; }
.sort-select {
  padding: 7px 28px 7px 12px; font-family: var(--font); font-size: 13px;
  background: var(--bg-card) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%2394a3b8' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>") no-repeat right 10px center;
  border: 1px solid var(--border-focus); border-radius: 8px; color: var(--text);
  appearance: none; -webkit-appearance: none; -moz-appearance: none;
  cursor: pointer; font-weight: 600;
}
.sort-select:focus { outline: none; border-color: var(--blue); }

.recipe-revenue { font-size: 13px; color: var(--text2); font-weight: 500; margin-top: 6px; }
.recipe-revenue b { color: var(--green); font-weight: 700; font-family: 'JetBrains Mono', Menlo, monospace; }
.recipe-revenue .sub { color: var(--text3); font-size: 11px; }
.recipe-revenue .none { color: var(--text3); font-style: italic; }

.btn {
  padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border-focus);
  background: transparent; color: var(--text2); font-size: 13px; font-weight: 600;
  font-family: var(--font); cursor: pointer; transition: all 0.15s;
}
.btn:hover { border-color: var(--text2); color: var(--text); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: var(--blue); color: #fff; border-color: var(--blue); }
.btn-primary:hover { background: #0ea5e9; border-color: #0ea5e9; color: #fff; }
.btn-warn { background: var(--amber-soft); border-color: var(--amber); color: var(--amber); }
.btn-warn:hover { background: rgba(245,158,11,0.22); color: var(--amber); }
.btn-ghost { border: none; color: var(--text3); padding: 8px 12px; }
.btn-ghost:hover { color: var(--text); background: rgba(255,255,255,0.03); }

.recipe-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 14px; padding: 24px; margin-bottom: 24px;
}
.recipe-title { font-size: 24px; font-weight: 700; color: var(--text); }
.recipe-meta { display:flex; gap:14px; flex-wrap:wrap; font-size:12px; color:var(--text3);
  margin-top: 6px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.4px; }
.recipe-meta span b { color: var(--text2); font-weight: 600; }

table.ingredients { width:100%; border-collapse: collapse; font-size: 13px; }
table.ingredients th { text-align:left; font-size: 11px; color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
  padding: 10px 8px; border-bottom: 1px solid var(--border); }
table.ingredients td { padding: 12px 8px; border-bottom: 1px solid var(--border);
  vertical-align: top; }
table.ingredients tr:last-child td { border-bottom: none; }
table.ingredients td.ing-name { font-weight: 600; color: var(--text); width: 22%; }
table.ingredients td.ing-product { width: 28%; }
table.ingredients td.ing-qty { width: 12%; }
table.ingredients td.ing-unit { width: 14%; }
table.ingredients td.ing-cost { width: 18%; text-align: right; white-space: nowrap; }

input.q-input, select.u-input, input.p-input {
  width: 100%; padding: 7px 9px; font-family: var(--font); font-size: 13px;
  background: var(--bg); border: 1px solid var(--border-focus);
  border-radius: 7px; color: var(--text);
}
input.q-input:focus, select.u-input:focus, input.p-input:focus {
  outline: none; border-color: var(--blue);
}

.pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 9px; border-radius: 6px; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.4px;
}
.pill-red { background: var(--red-soft); color: var(--red); }
.pill-amber { background: var(--amber-soft); color: var(--amber); cursor: pointer; border: 1px solid transparent; }
.pill-amber:hover { border-color: var(--amber); }
.pill-muted { background: rgba(148,163,184,0.08); color: var(--text3); }
.pill-green { background: var(--green-soft); color: var(--green); }

.ing-warn {
  display: inline-block; margin-left: 6px; padding: 1px 6px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.4px;
  text-transform: uppercase; border-radius: 4px;
  background: var(--amber-soft); color: var(--amber);
  border: 1px solid rgba(245,158,11,0.35);
}

.product-cell { display: flex; flex-direction: column; gap: 4px; }
.product-name { color: var(--text); font-weight: 500; cursor: pointer; font-size: 13px; }
.product-name:hover { color: var(--blue); }
.product-sub { font-size: 11px; color: var(--text3); }

.search-wrap { position: relative; }
.search-dropdown {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--bg-elevated); border: 1px solid var(--border-focus);
  border-radius: 8px; z-index: 10; max-height: 260px; overflow-y: auto;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.search-result {
  padding: 8px 10px; cursor: pointer; border-bottom: 1px solid var(--border);
  font-size: 12px; color: var(--text2);
}
.search-result:last-child { border-bottom: none; }
.search-result:hover { background: rgba(56,189,248,0.08); color: var(--text); }
.search-result b { color: var(--text); font-weight: 600; }

.cost-label { display:block; font-size: 10px; color: var(--text3); margin-top: 2px;
  text-transform: uppercase; letter-spacing: 0.4px; }
.cost-value { font-weight: 600; font-family: 'JetBrains Mono', Menlo, monospace; }
.cost-muted { color: var(--text3); }
.cost-ok { color: var(--green); }

.totals-row {
  display: flex; gap: 24px; padding: 16px 8px; margin-top: 8px;
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.totals-item { flex: 1; min-width: 120px; }
.totals-label { font-size: 11px; color: var(--text3); text-transform: uppercase;
  letter-spacing: 0.5px; font-weight: 600; }
.totals-value { font-size: 20px; font-weight: 700; margin-top: 4px;
  font-family: 'JetBrains Mono', Menlo, monospace; color: var(--text); }
.totals-value.good { color: var(--green); }
.totals-value.warn { color: var(--amber); }
.totals-value.bad { color: var(--red); }

.action-row {
  display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; align-items: center;
}
.action-row .spacer { flex: 1; }

.conv-dialog {
  background: var(--bg-elevated); border: 1px solid var(--amber);
  border-left: 3px solid var(--amber);
  border-radius: 10px; padding: 16px; margin-top: 10px;
}
.conv-dialog h4 { font-size: 13px; font-weight: 700; color: var(--amber);
  text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.conv-context { background: rgba(0,0,0,0.3); padding: 10px 12px; border-radius: 8px;
  font-size: 12px; color: var(--text2); line-height: 1.6; margin-bottom: 12px; }
.conv-context b { color: var(--text); }
.conv-form { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.conv-form .label { font-size: 12px; color: var(--text2); }
.conv-form input.qty, .conv-form select.unit {
  padding: 7px 9px; background: var(--bg); border: 1px solid var(--border-focus);
  border-radius: 7px; color: var(--text); font-family: var(--font); font-size: 13px;
}
.conv-form input.qty { width: 100px; }
.conv-form select.unit { min-width: 110px; }
.conv-helper { font-size: 11px; color: var(--text3); margin-top: 8px; }
.conv-buttons { display: flex; gap: 8px; margin-top: 12px; }

.empty-state { padding: 60px 20px; text-align: center; color: var(--text3); }
.empty-state h3 { color: var(--text); font-size: 18px; margin-bottom: 8px; }

.loading { text-align: center; padding: 40px; color: var(--text3); font-size: 14px; }

.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: var(--bg-elevated); border: 1px solid var(--border-focus);
  padding: 10px 16px; border-radius: 8px; font-size: 13px;
  color: var(--text); z-index: 1000; opacity: 0; transition: opacity 0.2s;
  pointer-events: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.toast.show { opacity: 1; }
.toast.err { border-color: var(--red); color: var(--red); }
.toast.ok { border-color: var(--green); color: var(--green); }

@media (max-width: 820px) {
  .main-content { padding: 16px; }
  .recipe-card { padding: 16px; }
  .recipe-title { font-size: 20px; }
  table.ingredients { font-size: 12px; }
  table.ingredients th, table.ingredients td { padding: 8px 4px; }
  .totals-row { gap: 12px; }
  .totals-value { font-size: 16px; }
}
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar-container" id="sidebar-mount"></div>
  <div class="main-content">
    <div class="page-header">
      <div>
        <div class="page-title">Recipe Cost Fixer</div>
        <div class="page-sub">Walk through zero-cost recipes and fill in quantities, product links, and unit conversions.</div>
      </div>
      <div class="header-controls">
        <select class="sort-select" id="sort-select" title="Sort worklist">
          <option value="revenue">Sort: Revenue impact</option>
          <option value="alpha">Sort: Alphabetical</option>
          <option value="default">Sort: Default (linked-first)</option>
        </select>
        <button class="btn" id="btn-reset">Reset worklist</button>
      </div>
    </div>

    <div class="progress-bar" id="progress-bar">
      <div class="loading">Loading worklist…</div>
    </div>

    <div id="recipe-container"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/static/sidebar.js"></script>
<script>
(function(){
  'use strict';

  const state = {
    queue: [],
    idx: 0,
    recipe: null,
    ingredients: [],
    fixed: 0,
    total_zero: 0,
    remaining: 0,
    needs_research: 0,
    high_cost_count: 0,
    high_cost_threshold: 70,
    sort: 'revenue',
    mode: 'zero_cost',
    debouncers: {},
    dirty: new Set(),
    openConversionFor: null,
  };

  const fmtInt = n => Number(n || 0).toLocaleString('en-US');
  const fmtMoney0 = n => '$' + Math.round(Number(n || 0)).toLocaleString('en-US');

  function worklistUrl(){
    const base = state.mode === 'high_cost_review'
      ? '/api/recipe-fixer/high-cost-review'
      : '/api/recipe-fixer/worklist';
    return base + '?sort=' + encodeURIComponent(state.sort);
  }

  const $ = sel => document.querySelector(sel);
  const fmt$ = n => (n === null || n === undefined) ? '—' : '$' + Number(n).toFixed(2);
  const esc = s => String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');

  function toast(msg, kind){
    const el = $('#toast');
    el.textContent = msg;
    el.className = 'toast show' + (kind ? ' ' + kind : '');
    clearTimeout(toast._t);
    toast._t = setTimeout(()=>{ el.classList.remove('show'); }, 2400);
  }

  async function api(path, opts){
    const res = await fetch(path, Object.assign({
      credentials: 'same-origin',
      headers: {'Content-Type':'application/json'}
    }, opts || {}));
    if (!res.ok){
      let msg = 'HTTP ' + res.status;
      try { const j = await res.json(); if (j.error) msg = j.error; } catch(e){}
      throw new Error(msg);
    }
    return res.json();
  }

  async function loadWorklist(){
    const w = await api(worklistUrl());
    state.queue = w.queue || [];
    state.fixed = w.fixed || 0;
    state.total_zero = w.total_zero || 0;
    state.remaining = w.remaining || 0;
    state.needs_research = w.needs_research || 0;
    state.high_cost_count = w.high_cost_count || 0;
    state.high_cost_threshold = w.high_cost_threshold || 70;
    // find idx of first non-needs_research if we don't have one selected
    if (!state.recipe){
      const firstId = w.next_recipe_id;
      state.idx = Math.max(0, state.queue.findIndex(q => q.id === firstId));
      if (state.idx < 0) state.idx = 0;
    }
    renderProgress();
    if (state.queue.length === 0){
      renderDone();
    } else {
      const cur = state.queue[state.idx];
      if (cur) await loadRecipe(cur.id);
    }
  }

  function renderProgress(){
    const p = $('#progress-bar');
    const rightLink = state.mode === 'high_cost_review'
      ? '<a href="javascript:void(0)" class="back-link" id="back-to-queue">← Back to fixer queue</a>'
      : (state.high_cost_count > 0
          ? '<a href="javascript:void(0)" class="review-link" id="review-high-cost">Review '
            + state.high_cost_count + ' high-cost-ratio recipe'
            + (state.high_cost_count === 1 ? '' : 's') + '</a>'
          : '');
    let leftStats;
    if (state.mode === 'high_cost_review'){
      leftStats =
        '<div class="stat amber"><b>' + state.queue.length + '</b> recipes with food cost &gt; '
          + state.high_cost_threshold + '%</div>';
    } else {
      leftStats =
        '<div class="stat green"><b>' + state.fixed + '</b> fixed</div>' +
        '<div class="stat"><b>' + state.remaining + '</b> remaining</div>' +
        '<div class="stat amber"><b>' + state.needs_research + '</b> needs research</div>' +
        '<div class="stat"><b>' + state.total_zero + '</b> still zero-cost</div>';
    }
    p.innerHTML =
      leftStats +
      '<div class="spacer"></div>' +
      (state.queue.length
        ? '<div class="stat">Recipe <b>' + (state.idx + 1) + '</b> of <b>' + state.queue.length + '</b></div>'
        : '') +
      rightLink;
    const hc = $('#review-high-cost');
    if (hc) hc.onclick = enterHighCostReview;
    const bk = $('#back-to-queue');
    if (bk) bk.onclick = exitHighCostReview;
  }

  function renderDone(){
    const msg = state.mode === 'high_cost_review'
      ? '<h3>No high-cost-ratio recipes</h3><p>All costed recipes are under ' + state.high_cost_threshold + '% food cost.</p>'
      : '<h3>All clear</h3><p>No zero-cost recipes left in the worklist.</p>';
    $('#recipe-container').innerHTML = '<div class="recipe-card empty-state">' + msg + '</div>';
  }

  async function enterHighCostReview(){
    state.mode = 'high_cost_review';
    state.recipe = null;
    state.idx = 0;
    await loadWorklist();
  }

  async function exitHighCostReview(){
    state.mode = 'zero_cost';
    state.recipe = null;
    state.idx = 0;
    await loadWorklist();
  }

  async function loadRecipe(recipeId){
    $('#recipe-container').innerHTML = '<div class="recipe-card"><div class="loading">Loading recipe…</div></div>';
    try {
      const d = await api('/api/recipe-fixer/recipe/' + recipeId);
      state.recipe = d.recipe;
      state.ingredients = d.ingredients;
      state.units = d.canonical_units;
      state.dirty.clear();
      state.openConversionFor = null;
      renderRecipe();
    } catch(e){
      $('#recipe-container').innerHTML =
        '<div class="recipe-card empty-state"><h3>Could not load recipe</h3><p>' + esc(e.message) + '</p></div>';
    }
  }

  function renderRecipe(){
    const r = state.recipe;
    const meta = [];
    if (r.location) meta.push('<span><b>Location:</b> ' + esc(r.location) + '</span>');
    if (r.category) meta.push('<span><b>Category:</b> ' + esc(r.category) + '</span>');
    if (r.menu_price != null) meta.push('<span><b>Menu:</b> $' + Number(r.menu_price).toFixed(2) + '</span>');
    if (r.serving_size) meta.push('<span><b>Servings:</b> ' + r.serving_size + (r.serving_unit ? ' ' + esc(r.serving_unit) : '') + '</span>');
    if (r.yield_qty) meta.push('<span><b>Yield:</b> ' + r.yield_qty + ' ' + esc(r.yield_unit || '') + '</span>');
    if (r.needs_research) meta.push('<span class="pill pill-amber">Needs research</span>');

    const rows = state.ingredients.map(renderIngredientRow).join('');
    const totals = computeTotals();

    const qItem = state.queue[state.idx] || {};
    let revLine = '';
    if (qItem.revenue_90d && qItem.revenue_90d > 0){
      revLine =
        '<div class="recipe-revenue">' +
          esc(r.name) + ' &middot; <b>' + fmtMoney0(qItem.revenue_90d) + '</b> ' +
          '<span class="sub">(' + fmtInt(qItem.qty_sold_90d) + ' sold, 90d)</span>' +
        '</div>';
    } else if (qItem.id){
      revLine = '<div class="recipe-revenue"><span class="none">No matching sales in the last 90 days.</span></div>';
    }

    const html =
      '<div class="recipe-card">' +
        '<div class="recipe-title">' + esc(r.name) + '</div>' +
        revLine +
        '<div class="recipe-meta">' + meta.join('') + '</div>' +
        '<table class="ingredients">' +
          '<thead><tr>' +
            '<th>Ingredient</th>' +
            '<th>Linked product</th>' +
            '<th>Quantity</th>' +
            '<th>Unit</th>' +
            '<th style="text-align:right">Line cost</th>' +
          '</tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
        renderTotals(totals) +
        renderActions() +
      '</div>';

    $('#recipe-container').innerHTML = html;
    bindIngredientEvents();
    bindActionEvents();
  }

  function renderIngredientRow(ing){
    const unitOpts = ['',].concat(state.units || []).map(u =>
      '<option value="' + esc(u) + '"' + ((ing.unit||'') === u ? ' selected' : '') + '>' +
        (u ? esc(u) : '— unit —') + '</option>'
    ).join('');

    let productCell;
    if (ing.product_linked && ing.product){
      const p = ing.product;
      const priceStr = p.current_price ? ' · ' + fmt$(p.current_price) : '';
      productCell =
        '<div class="product-cell" data-ing="'+ing.id+'">' +
          '<span class="product-name" data-action="edit-product">' + esc(p.display_name || p.name) + '</span>' +
          '<span class="product-sub">' + esc(p.pack_size || '') + ' ' + esc(p.pack_unit || '') + priceStr + '</span>' +
          '<div class="search-wrap" style="display:none"></div>' +
        '</div>';
    } else {
      const txt = ing.product_name_text ? ' <span class="product-sub">hint: ' + esc(ing.product_name_text) + '</span>' : '';
      productCell =
        '<div class="product-cell" data-ing="'+ing.id+'">' +
          '<span class="pill pill-red" data-action="edit-product">Not linked</span>' + txt +
          '<div class="search-wrap" style="display:none"></div>' +
        '</div>';
    }

    const costCell = renderCostCell(ing);
    const convDialog = (state.openConversionFor === ing.id) ? renderConversionDialog(ing) : '';

    let warnBadge = '';
    if (ing.cost_source === 'no_unit' || ing.needs_unit){
      warnBadge = '<span class="ing-warn" title="Recipe unit is missing — cost cannot be computed">Missing unit</span>';
    } else if (ing.cost_source === 'no_conversion' || ing.needs_conversion){
      warnBadge = '<span class="ing-warn" title="Recipe unit does not match the product\'s purchase unit — set a conversion">Needs conversion</span>';
    }

    return (
      '<tr data-ing="'+ing.id+'">' +
        '<td class="ing-name">' + esc(ing.product_name_text || '—') + warnBadge + '</td>' +
        '<td class="ing-product">' + productCell + '</td>' +
        '<td class="ing-qty">' +
          '<input class="q-input" type="number" step="0.01" min="0" ' +
          'value="' + (Number(ing.quantity) || '') + '" data-ing="'+ing.id+'" data-field="quantity">' +
        '</td>' +
        '<td class="ing-unit">' +
          '<select class="u-input" data-ing="'+ing.id+'" data-field="unit">' + unitOpts + '</select>' +
        '</td>' +
        '<td class="ing-cost" data-ing="'+ing.id+'" data-cell="cost">' + costCell + '</td>' +
      '</tr>' +
      (convDialog ?
        '<tr data-conv-row="'+ing.id+'"><td colspan="5" style="padding:0 8px 12px 8px;">' + convDialog + '</td></tr>'
        : '')
    );
  }

  function renderCostCell(ing){
    let html = '';
    if (ing.cost_source === 'no_unit' || ing.needs_unit){
      html = '<div><span class="cost-value cost-muted">—</span></div>' +
             '<span class="pill pill-amber" data-action="set-unit" data-ing="'+ing.id+'">Set unit</span>';
    } else if (ing.cost_source === 'no_conversion' || ing.needs_conversion){
      const label = ing.line_cost > 0 ? fmt$(ing.line_cost) : '—';
      html = '<div><span class="cost-value cost-muted">' + label + '</span></div>' +
             '<span class="pill pill-amber" data-action="set-conversion" data-ing="'+ing.id+'">Set conversion</span>';
    } else if (ing.line_cost && ing.line_cost > 0){
      html = '<div><span class="cost-value cost-ok">' + fmt$(ing.line_cost) + '</span></div>' +
             '<span class="cost-label">' + esc(ing.cost_source || '') + '</span>';
      // If a conversion already exists that we'd want to edit, offer it when source=standard_conversion AND product has a vendor item that doesn't match unit
      if (ing.cost_source === 'standard_conversion' && ing.product && ing.product.active_vendor_item){
        html += ' <a href="javascript:void(0)" class="cost-label" style="color:var(--blue); text-decoration:none; margin-left:4px;" data-action="edit-conversion" data-ing="'+ing.id+'">edit conversion</a>';
      }
    } else if (ing.cost_source === 'no_price' && ing.product_linked){
      html = '<span class="cost-value cost-muted">—</span>' +
             '<span class="cost-label">no price on product</span>';
    } else if (!ing.product_linked){
      html = '<span class="cost-value cost-muted">—</span>' +
             '<span class="cost-label">not linked</span>';
    } else {
      html = '<span class="cost-value cost-muted">—</span>';
      if (ing.cost_source) html += '<span class="cost-label">' + esc(ing.cost_source) + '</span>';
    }
    return html;
  }

  function computeTotals(){
    let total = 0;
    for (const ing of state.ingredients){
      if (ing.line_cost && ing.line_cost > 0) total += Number(ing.line_cost);
    }
    const servings = Number(state.recipe.serving_size) || 1;
    const perServing = servings > 0 ? total / servings : total;
    const price = Number(state.recipe.menu_price) || 0;
    const pct = price > 0 ? (perServing / price) * 100 : null;
    return { total, perServing, pct };
  }

  function renderTotals(t){
    const pctClass = t.pct == null ? '' : (t.pct < 30 ? 'good' : t.pct <= 40 ? 'warn' : 'bad');
    return (
      '<div class="totals-row">' +
        '<div class="totals-item"><div class="totals-label">Total cost</div>' +
          '<div class="totals-value">' + fmt$(t.total) + '</div></div>' +
        '<div class="totals-item"><div class="totals-label">Cost / serving</div>' +
          '<div class="totals-value">' + fmt$(t.perServing) + '</div></div>' +
        '<div class="totals-item"><div class="totals-label">Food cost %</div>' +
          '<div class="totals-value ' + pctClass + '">' +
            (t.pct == null ? '—' : t.pct.toFixed(1) + '%') + '</div></div>' +
      '</div>'
    );
  }

  function renderActions(){
    const r = state.recipe;
    const skipLabel = r.needs_research ? 'Unmark needs-research' : 'Skip (needs research)';
    const skipAction = r.needs_research ? 'unskip' : 'skip';
    return (
      '<div class="action-row">' +
        '<button class="btn-ghost btn" data-action="prev" '+(state.idx===0?'disabled':'')+'>← Previous</button>' +
        '<div class="spacer"></div>' +
        '<button class="btn btn-warn" data-action="'+skipAction+'">' + skipLabel + '</button>' +
        '<button class="btn" data-action="save">Save</button>' +
        '<button class="btn btn-primary" data-action="save-next">Save &amp; Next →</button>' +
      '</div>'
    );
  }

  function bindIngredientEvents(){
    // Quantity + unit changes
    document.querySelectorAll('input.q-input, select.u-input').forEach(el => {
      el.addEventListener('input', () => scheduleIngredientUpdate(Number(el.dataset.ing)));
      el.addEventListener('change', () => scheduleIngredientUpdate(Number(el.dataset.ing), true));
    });
    // Linked product / not-linked picker
    document.querySelectorAll('[data-action="edit-product"]').forEach(el => {
      el.addEventListener('click', () => openProductPicker(Number(el.closest('.product-cell').dataset.ing)));
    });
    // Set-conversion pill
    document.querySelectorAll('[data-action="set-conversion"]').forEach(el => {
      el.addEventListener('click', () => toggleConversionDialog(Number(el.dataset.ing)));
    });
    // Set-unit pill — focus the unit dropdown for that row
    document.querySelectorAll('[data-action="set-unit"]').forEach(el => {
      el.addEventListener('click', () => focusUnitSelect(Number(el.dataset.ing)));
    });
    // Edit-conversion link
    document.querySelectorAll('[data-action="edit-conversion"]').forEach(el => {
      el.addEventListener('click', () => toggleConversionDialog(Number(el.dataset.ing)));
    });
    // Conversion dialog buttons
    document.querySelectorAll('[data-action="save-conversion"]').forEach(el => {
      el.addEventListener('click', () => saveConversion(Number(el.dataset.ing)));
    });
    document.querySelectorAll('[data-action="cancel-conversion"]').forEach(el => {
      el.addEventListener('click', () => { state.openConversionFor = null; renderRecipe(); });
    });
  }

  function bindActionEvents(){
    document.querySelectorAll('[data-action="prev"]').forEach(el => el.addEventListener('click', prevRecipe));
    document.querySelectorAll('[data-action="save-next"]').forEach(el => el.addEventListener('click', () => saveAndAdvance(true)));
    document.querySelectorAll('[data-action="save"]').forEach(el => el.addEventListener('click', () => saveAndAdvance(false)));
    document.querySelectorAll('[data-action="skip"]').forEach(el => el.addEventListener('click', skipRecipe));
    document.querySelectorAll('[data-action="unskip"]').forEach(el => el.addEventListener('click', unskipRecipe));
    $('#btn-reset').onclick = () => { state.recipe = null; loadWorklist(); };
    const sortEl = $('#sort-select');
    if (sortEl && !sortEl._bound){
      sortEl._bound = true;
      sortEl.value = state.sort;
      sortEl.addEventListener('change', () => {
        state.sort = sortEl.value || 'revenue';
        state.recipe = null;
        state.idx = 0;
        loadWorklist();
      });
    }
  }

  function scheduleIngredientUpdate(ingId, immediate){
    clearTimeout(state.debouncers[ingId]);
    const delay = immediate ? 0 : 300;
    state.debouncers[ingId] = setTimeout(() => sendIngredientUpdate(ingId), delay);
  }

  async function sendIngredientUpdate(ingId){
    const qEl = document.querySelector('input.q-input[data-ing="'+ingId+'"]');
    const uEl = document.querySelector('select.u-input[data-ing="'+ingId+'"]');
    if (!qEl || !uEl) return;
    const body = {
      quantity: parseFloat(qEl.value) || 0,
      unit: uEl.value,
    };
    try {
      const payload = await api('/api/recipe-fixer/ingredient/' + ingId, {
        method: 'POST', body: JSON.stringify(body)
      });
      updateIngredientInState(ingId, payload);
      updateIngredientCostCell(ingId);
      updateTotalsInPlace();
    } catch(e){
      toast('Update failed: ' + e.message, 'err');
    }
  }

  function updateIngredientInState(ingId, payload){
    const i = state.ingredients.findIndex(x => x.id === ingId);
    if (i >= 0) state.ingredients[i] = payload;
  }

  function updateIngredientCostCell(ingId){
    const cell = document.querySelector('td.ing-cost[data-ing="'+ingId+'"]');
    const ing = state.ingredients.find(x => x.id === ingId);
    if (cell && ing){
      cell.innerHTML = renderCostCell(ing);
      cell.querySelectorAll('[data-action="set-conversion"]').forEach(el =>
        el.addEventListener('click', () => toggleConversionDialog(Number(el.dataset.ing))));
      cell.querySelectorAll('[data-action="edit-conversion"]').forEach(el =>
        el.addEventListener('click', () => toggleConversionDialog(Number(el.dataset.ing))));
      cell.querySelectorAll('[data-action="set-unit"]').forEach(el =>
        el.addEventListener('click', () => focusUnitSelect(Number(el.dataset.ing))));
    }
    // Re-render the badge on the name cell since cost_source may have changed
    const nameCell = document.querySelector('tr[data-ing="'+ingId+'"] td.ing-name');
    if (nameCell && ing){
      const base = esc(ing.product_name_text || '—');
      let badge = '';
      if (ing.cost_source === 'no_unit' || ing.needs_unit){
        badge = '<span class="ing-warn" title="Recipe unit is missing — cost cannot be computed">Missing unit</span>';
      } else if (ing.cost_source === 'no_conversion' || ing.needs_conversion){
        badge = '<span class="ing-warn" title="Recipe unit does not match the product\'s purchase unit — set a conversion">Needs conversion</span>';
      }
      nameCell.innerHTML = base + badge;
    }
  }

  function focusUnitSelect(ingId){
    const sel = document.querySelector('select.u-input[data-ing="'+ingId+'"]');
    if (!sel) return;
    sel.scrollIntoView({block: 'center', behavior: 'smooth'});
    sel.focus();
    // Open the native picker where supported
    if (typeof sel.showPicker === 'function'){
      try { sel.showPicker(); } catch(e){ /* not supported */ }
    }
  }

  function updateTotalsInPlace(){
    const t = computeTotals();
    const row = document.querySelector('.totals-row');
    if (!row) return;
    const vals = row.querySelectorAll('.totals-value');
    if (vals.length >= 3){
      vals[0].textContent = fmt$(t.total);
      vals[1].textContent = fmt$(t.perServing);
      vals[2].textContent = t.pct == null ? '—' : t.pct.toFixed(1) + '%';
      vals[2].classList.remove('good','warn','bad');
      if (t.pct != null){
        vals[2].classList.add(t.pct < 30 ? 'good' : t.pct <= 40 ? 'warn' : 'bad');
      }
    }
  }

  // --- Product picker -----------------------------------------------

  function openProductPicker(ingId){
    const cell = document.querySelector('.product-cell[data-ing="'+ingId+'"]');
    if (!cell) return;
    const wrap = cell.querySelector('.search-wrap');
    wrap.style.display = 'block';
    wrap.innerHTML = '<input class="p-input" placeholder="Search products…" autofocus>' +
                     '<div class="search-dropdown" style="display:none"></div>';
    const input = wrap.querySelector('input.p-input');
    const dd = wrap.querySelector('.search-dropdown');
    input.focus();
    let dTimer;
    input.addEventListener('input', () => {
      clearTimeout(dTimer);
      dTimer = setTimeout(async () => {
        const q = input.value.trim();
        if (q.length < 2){ dd.style.display = 'none'; return; }
        try {
          const results = await api('/api/recipe-fixer/product-search?q=' + encodeURIComponent(q));
          if (!results.length){
            dd.innerHTML = '<div class="search-result" style="color:var(--text3)">No matches</div>';
          } else {
            dd.innerHTML = results.map(p =>
              '<div class="search-result" data-pid="'+p.id+'">' +
                '<b>' + esc(p.display_name || p.name) + '</b>' +
                (p.current_price ? ' · ' + fmt$(p.current_price) : '') +
                (p.pack_unit ? ' · ' + esc(p.pack_unit) : '') +
              '</div>'
            ).join('');
          }
          dd.style.display = 'block';
          dd.querySelectorAll('.search-result[data-pid]').forEach(r => {
            r.addEventListener('click', () => pickProduct(ingId, Number(r.dataset.pid)));
          });
        } catch(e){
          toast('Search failed: ' + e.message, 'err');
        }
      }, 250);
    });
    // Close on outside click
    setTimeout(() => {
      document.addEventListener('click', closeOutside);
    }, 0);
    function closeOutside(e){
      if (!wrap.contains(e.target)){
        wrap.style.display = 'none';
        document.removeEventListener('click', closeOutside);
      }
    }
  }

  async function pickProduct(ingId, productId){
    try {
      const payload = await api('/api/recipe-fixer/ingredient/' + ingId, {
        method: 'POST',
        body: JSON.stringify({ product_id: productId })
      });
      updateIngredientInState(ingId, payload);
      renderRecipe();
      toast('Linked', 'ok');
    } catch(e){
      toast('Link failed: ' + e.message, 'err');
    }
  }

  // --- Conversion dialog --------------------------------------------

  // The conversion's from_unit is the product's purchase unit (what it's
  // sold as — "bottle", "each", "case"), NOT the recipe unit. Preference
  // order matches how the invoice / vendor sees the product first, then
  // the product's own fields.
  function resolvePurchaseUnit(ing){
    const p = ing.product || {};
    const avi = p.active_vendor_item || {};
    const candidates = [avi.pack_unit, p.unit, p.pack_unit, p.inventory_unit];
    for (const c of candidates){
      const v = (c || '').trim();
      if (v) return v.toLowerCase();
    }
    return '';
  }

  async function toggleConversionDialog(ingId){
    if (state.openConversionFor === ingId){
      state.openConversionFor = null;
      renderRecipe();
      return;
    }
    const ing = state.ingredients.find(x => x.id === ingId);
    if (!ing || !ing.product_id){
      toast('Link a product before setting a conversion', 'err');
      return;
    }
    state.openConversionFor = ingId;
    // Prefetch any existing conversion keyed on the product's purchase unit.
    // Fall back to the recipe unit if the product has no purchase unit at all.
    const lookupFrom = resolvePurchaseUnit(ing) || (ing.unit || 'each').toLowerCase();
    try {
      const data = await api('/api/recipe-fixer/conversion?product_id=' + ing.product_id +
                             '&from_unit=' + encodeURIComponent(lookupFrom));
      state.convContext = data;
    } catch(e){
      state.convContext = null;
    }
    renderRecipe();
  }

  function renderConversionDialog(ing){
    const ctx = state.convContext || {};
    const existing = ctx.conversion;
    const avi = ctx.active_vendor_item;
    const prod = ctx.product;

    const purchaseUnit = resolvePurchaseUnit(ing);
    const hasPurchaseUnit = !!purchaseUnit;
    // If no purchase unit at all, fall back to the recipe unit so the user
    // can still save something — but warn them it'll only apply here.
    const fromUnit = hasPurchaseUnit ? purchaseUnit : (ing.unit || 'each').toLowerCase();
    const recipeUnit = (ing.unit || 'each').toLowerCase();

    // Build the to_unit dropdown: canonical units + anything on the product
    const extraUnits = new Set(state.units || []);
    if (prod){
      ['pack_unit','inventory_unit','recipe_unit','purchase_unit'].forEach(k => {
        if (prod[k]) extraUnits.add(String(prod[k]).toLowerCase());
      });
    }
    if (avi && avi.contains_unit) extraUnits.add(String(avi.contains_unit).toLowerCase());
    const allUnits = Array.from(extraUnits).filter(Boolean);

    // Defaults: if an existing conversion is loaded, use its to_qty/to_unit.
    // Otherwise default the to_unit to the current recipe unit so the first
    // save is immediately useful for this recipe.
    const defQty = existing ? existing.to_qty : '';
    const defUnit = existing ? String(existing.to_unit).toLowerCase() : recipeUnit;
    const unitOpts = allUnits.map(u =>
      '<option value="'+esc(u)+'"' + (defUnit === u ? ' selected' : '') + '>' + esc(u) + '</option>'
    ).join('');

    const qtyVal = ing.quantity || 1;
    const ctxBlock =
      '<div class="conv-context">' +
        'Recipe uses: <b>' + qtyVal + ' ' + esc(recipeUnit) + '</b> of <b>' +
          esc(ing.product_name_text || (prod && (prod.display_name || prod.name)) || '') + '</b><br>' +
        (avi ?
          'Product is: <b>' + esc(avi.pack_size || '') + ' ' + esc(avi.pack_unit || '') + '</b>' +
          (avi.pack_contains ? ' · contains <b>' + avi.pack_contains + ' ' + esc(avi.contains_unit || '') + '</b>' : '') +
          (avi.purchase_price != null ? ' · priced at <b>' + fmt$(avi.purchase_price) + '</b>' : '')
        : 'No active vendor item linked.') +
      '</div>';

    const warning = hasPurchaseUnit ? '' :
      '<div class="conv-helper" style="color:var(--amber)">Product has no purchase unit set — this conversion will only apply to recipes using <b>' + esc(recipeUnit) + '</b>.</div>';

    const helperHint = hasPurchaseUnit
      ? 'e.g. "1 bottle = 25.36 fl_oz" for a 750ml liquor bottle'
      : 'e.g. "1 ' + esc(recipeUnit) + ' = 12 fl_oz" for a 12 oz can';

    return (
      '<div class="conv-dialog" data-conv="'+ing.id+'">' +
        '<h4>' + (existing ? 'Edit' : 'Set') + ' unit conversion</h4>' +
        ctxBlock +
        '<div class="conv-form">' +
          '<span class="label">1 <b style="color:var(--text); text-transform:none; font-weight:700">' + esc(fromUnit) + '</b> of this product =</span>' +
          '<input class="qty" type="number" step="0.0001" min="0" value="'+defQty+'" data-conv-qty="'+ing.id+'" autofocus>' +
          '<select class="unit" data-conv-unit="'+ing.id+'">' + unitOpts + '</select>' +
        '</div>' +
        '<div class="conv-helper">' + helperHint + '</div>' +
        warning +
        '<div class="conv-buttons">' +
          '<button class="btn btn-primary" data-action="save-conversion" data-ing="'+ing.id+'">Save conversion</button>' +
          '<button class="btn" data-action="cancel-conversion" data-ing="'+ing.id+'">Cancel</button>' +
        '</div>' +
      '</div>'
    );
  }

  async function saveConversion(ingId){
    const ing = state.ingredients.find(x => x.id === ingId);
    if (!ing) return;
    const qEl = document.querySelector('[data-conv-qty="'+ingId+'"]');
    const uEl = document.querySelector('[data-conv-unit="'+ingId+'"]');
    const to_qty = parseFloat(qEl.value);
    const to_unit = uEl.value;
    if (!to_qty || to_qty <= 0 || !to_unit){
      toast('Enter a positive quantity and pick a unit', 'err');
      return;
    }
    // from_unit = product's purchase unit (bottle, each, case, etc.)
    // Fall back to recipe unit only when the product has no purchase unit.
    const from_unit = resolvePurchaseUnit(ing) || (ing.unit || 'each').toLowerCase();
    try {
      await api('/api/recipe-fixer/conversion', {
        method: 'POST',
        body: JSON.stringify({
          product_id: ing.product_id,
          from_qty: 1,
          from_unit: from_unit,
          to_qty: to_qty,
          to_unit: to_unit
        })
      });
      toast('Conversion saved', 'ok');
      state.openConversionFor = null;
      // Re-query ingredient to get updated cost
      await sendIngredientUpdate(ingId);
      renderRecipe();
    } catch(e){
      toast('Save failed: ' + e.message, 'err');
    }
  }

  // --- Save / skip / navigate ---------------------------------------

  async function saveAndAdvance(advance){
    if (!state.recipe) return;
    try {
      await api('/api/recipe-fixer/recipe/' + state.recipe.id + '/recost', { method: 'POST' });
    } catch(e){
      toast('Recost failed: ' + e.message, 'err');
      return;
    }
    toast('Saved', 'ok');
    if (advance){
      await advanceQueue();
    } else {
      await loadWorklist();
    }
  }

  async function advanceQueue(){
    // Re-fetch (honors current mode + sort) so counts update
    const w = await api(worklistUrl());
    state.queue = w.queue || [];
    state.fixed = w.fixed || 0;
    state.total_zero = w.total_zero || 0;
    state.remaining = w.remaining || 0;
    state.needs_research = w.needs_research || 0;
    state.high_cost_count = w.high_cost_count || 0;
    state.high_cost_threshold = w.high_cost_threshold || 70;
    state.idx = 0;
    renderProgress();
    if (state.queue.length === 0){
      state.recipe = null;
      renderDone();
    } else {
      await loadRecipe(state.queue[0].id);
    }
  }

  async function prevRecipe(){
    if (state.idx <= 0) return;
    state.idx -= 1;
    renderProgress();
    await loadRecipe(state.queue[state.idx].id);
  }

  async function skipRecipe(){
    if (!state.recipe) return;
    try {
      await api('/api/recipe-fixer/recipe/' + state.recipe.id + '/skip', { method: 'POST' });
      toast('Marked needs-research', 'ok');
      await advanceQueue();
    } catch(e){ toast('Skip failed: ' + e.message, 'err'); }
  }

  async function unskipRecipe(){
    if (!state.recipe) return;
    try {
      await api('/api/recipe-fixer/recipe/' + state.recipe.id + '/unskip', { method: 'POST' });
      toast('Unmarked', 'ok');
      await loadWorklist();
    } catch(e){ toast('Unskip failed: ' + e.message, 'err'); }
  }

  // --- Init ---------------------------------------------------------

  document.addEventListener('DOMContentLoaded', () => { loadWorklist(); });
})();
</script>
</body>
</html>
