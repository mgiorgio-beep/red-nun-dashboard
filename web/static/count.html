<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Red Nun — Inventory Count</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0c;--card:#1a1a1e;--card2:#222226;--border:rgba(255,255,255,0.08);
  --border2:rgba(255,255,255,0.15);--text:#f5f5f7;--text2:rgba(245,245,247,0.6);
  --text3:rgba(245,245,247,0.35);--red:#FF453A;--green:#30D158;--blue:#0A84FF;
  --orange:#FF9F0A;--purple:#BF5AF2;--yellow:#FFD60A;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;overflow-x:hidden}

.hdr{position:sticky;top:0;z-index:100;padding:calc(var(--safe-top) + 12px) 16px 12px;
  background:rgba(10,10,12,0.85);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border-bottom:1px solid var(--border)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:0}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-logo{width:32px;height:32px;background:linear-gradient(135deg,var(--red),#FF6259);
  border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:12px;color:#fff;flex-shrink:0}
.hdr-title{font-size:17px;font-weight:700;letter-spacing:-0.3px}
.hdr-sub{font-size:10px;color:var(--text3);font-weight:500}
.back-btn{background:none;border:none;color:var(--blue);font-size:14px;font-weight:600;
  cursor:pointer;padding:6px 0;text-decoration:none}

/* Setup */
.setup{padding:20px 16px;max-width:480px;margin:0 auto}
.setup-title{font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px}
.setup-sub{font-size:14px;color:var(--text2);margin-bottom:28px;line-height:1.5}
.setup-card{background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:20px;margin-bottom:16px}
.setup-label{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;
  letter-spacing:0.8px;margin-bottom:10px}
.loc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.loc-btn{padding:16px;border-radius:12px;background:var(--card2);border:2px solid var(--border);
  color:var(--text);font-size:15px;font-weight:600;cursor:pointer;text-align:center;transition:all 0.2s}
.loc-btn.sel{border-color:var(--red);background:rgba(255,69,58,0.1);color:var(--red)}
.start-btn{width:100%;padding:16px;border-radius:14px;background:var(--red);color:#fff;
  font-size:16px;font-weight:700;border:none;cursor:pointer;margin-top:24px;transition:all 0.2s}
.start-btn:disabled{opacity:0.35;cursor:not-allowed}
.start-btn:not(:disabled):active{transform:scale(0.98)}

/* Count Screen */
.count-screen{display:none}
.search-wrap{padding:12px 16px 8px;position:relative}
.search-input{width:100%;padding:10px 14px 10px 36px;background:var(--card);border:1px solid var(--border);
  border-radius:10px;color:var(--text);font-size:14px;outline:none}
.search-input:focus{border-color:var(--blue)}
.search-wrap svg{position:absolute;left:28px;top:50%;transform:translateY(-50%);opacity:0.3}

.count-stats{display:flex;gap:10px;padding:8px 16px;overflow-x:auto;scrollbar-width:none}
.count-stats::-webkit-scrollbar{display:none}
.mini-stat{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:8px 14px;flex-shrink:0}
.mini-stat-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase}
.mini-stat-val{font-size:16px;font-weight:700;margin-top:2px}

/* Section headers for storage locations */
.section-header{position:sticky;top:68px;z-index:50;padding:10px 16px;
  background:rgba(10,10,12,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.section-name{font-size:14px;font-weight:700;color:var(--blue)}
.section-count{font-size:11px;color:var(--text3);font-weight:600}
.section-icon{margin-right:6px}

.product-list{padding:0 14px calc(var(--safe-bottom) + 90px)}
.product-row{display:flex;align-items:center;gap:12px;padding:12px 12px;margin-bottom:8px;
  background:var(--card);border:1px solid var(--border);border-radius:14px}
.product-info{flex:1;min-width:0}
.product-name{font-size:15px;font-weight:600;line-height:1.25;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* Big tap-friendly quantity stepper */
.qty-stepper{display:flex;align-items:center;gap:8px;flex-shrink:0}
.step-btn{width:42px;height:42px;border-radius:11px;background:var(--card2);
  border:1px solid var(--border2);color:var(--text);font-size:24px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  user-select:none;-webkit-user-select:none;transition:all .12s}
.step-btn:active{background:var(--blue);border-color:var(--blue);color:#fff;transform:scale(0.92)}
.qty-wrap{display:flex;flex-direction:column;align-items:center}
.half-btn{margin-top:6px;font-size:13px;font-weight:700;color:var(--text2);background:var(--card2);
  border:1px solid var(--border);border-radius:7px;padding:5px 12px;cursor:pointer;line-height:1.2}
.half-btn:active{background:var(--blue);border-color:var(--blue);color:#fff}

/* Shelf sub-headers within an area */
.shelf-subhead{font-size:12px;font-weight:700;color:var(--text2);padding:12px 4px 4px;letter-spacing:0.3px}
.shelf-subhead span{color:var(--text3);font-weight:600}
/* Count unit chip — so it's obvious what to count */
.unit-chip{font-size:11px;font-weight:700;color:var(--blue);background:rgba(10,132,255,0.12);
  padding:2px 8px;border-radius:6px}

/* Drill-down: areas → shelves → items */
.nav-bar{position:sticky;top:0;z-index:60;display:flex;align-items:center;gap:10px;padding:calc(var(--safe-top) + 10px) 16px 10px;
  background:rgba(10,10,12,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-back{background:var(--card2);border:1px solid var(--border2);color:var(--text);border-radius:10px;
  min-width:40px;height:40px;font-size:20px;font-weight:700;cursor:pointer;flex-shrink:0}
.nav-title{flex:1;min-width:0}
.nav-title .t{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-title .s{font-size:11px;color:var(--text3);margin-top:1px}
.nav-pct{font-size:15px;font-weight:800;flex-shrink:0}
.drill{display:flex;align-items:center;gap:12px;padding:14px;margin-bottom:8px;
  background:var(--card);border:1px solid var(--border);border-radius:14px;cursor:pointer}
.drill:active{background:var(--card2)}
.drill-main{flex:1;min-width:0}
.drill-name{font-size:15px;font-weight:600}
.drill-sub{font-size:12px;color:var(--text3);margin-top:2px}
.pbar{height:6px;background:var(--card2);border-radius:4px;overflow:hidden;margin-top:8px}
.pbar>i{display:block;height:100%;background:var(--green);border-radius:4px;transition:width .2s}
.drill-pct{font-size:15px;font-weight:800;flex-shrink:0;width:48px;text-align:right}
.chev{color:var(--text3);font-size:20px;flex-shrink:0}
.out-btn{font-size:10px;font-weight:700;color:var(--red);background:rgba(255,69,58,0.1);
  border:1px solid rgba(255,69,58,0.3);border-radius:6px;padding:3px 9px;cursor:pointer}
.done-100{color:var(--green)} .done-part{color:var(--orange)} .done-0{color:var(--text3)}

/* Add item to shelf */
.addrow{display:block;width:100%;margin-bottom:10px;padding:13px;border-radius:12px;
  background:rgba(10,132,255,0.12);border:1px dashed rgba(10,132,255,0.45);color:var(--blue);
  font-size:14px;font-weight:700;cursor:pointer}
/* Equal-width shelf action buttons */
.shelf-actions{display:flex;gap:10px;margin-bottom:12px}
.sa-btn,.sa-done{flex:1 1 0;min-width:0;padding:14px 10px;border-radius:12px;font-size:14px;
  font-weight:700;cursor:pointer;border:1px solid;text-align:center;transition:all .12s}
.sa-btn:active,.sa-done:active{transform:scale(0.98)}
.sa-add{background:rgba(10,132,255,0.14);border-color:rgba(10,132,255,0.45);color:var(--blue)}
.sa-arrange{background:var(--card);border-color:var(--border2);color:var(--text2)}
.sa-done{background:rgba(48,209,88,0.14);border-color:rgba(48,209,88,0.5);color:var(--green)}
.ai-ov{position:fixed;inset:0;background:rgba(10,10,12,0.97);display:none;flex-direction:column;
  z-index:150;padding:calc(var(--safe-top) + 14px) 14px calc(var(--safe-bottom) + 14px)}
.ai-ov.open{display:flex}
.ai-head{display:flex;gap:8px;align-items:center;margin-bottom:12px}
.ai-search{flex:1;padding:13px 14px;background:var(--card);border:1px solid var(--border2);
  border-radius:11px;color:var(--text);font-size:16px;outline:none}
.ai-close{background:var(--card2);border:1px solid var(--border);color:var(--text);
  border-radius:11px;padding:13px 16px;font-weight:700;cursor:pointer}
.ai-results{flex:1;overflow-y:auto}
.ai-item{padding:14px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;
  justify-content:space-between;align-items:center;font-size:15px}
.ai-item:active{background:var(--card2)}
.ai-add{color:var(--blue);font-weight:700;flex-shrink:0;margin-left:10px}
.ai-new{padding:14px;color:var(--green);font-weight:700;cursor:pointer;border-top:1px solid var(--border)}

/* Arrange (reorder) mode */
.arrange-btns{display:flex;gap:8px;flex-shrink:0}
.step-btn:disabled{opacity:0.3;cursor:default}
.rm-btn{color:var(--red);border-color:rgba(255,69,58,0.4)}
.rm-btn:active{background:var(--red);border-color:var(--red);color:#fff}

/* iPad / wide: two columns, centered, roomier */
@media (min-width:768px){
  .product-list{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:1000px;margin:0 auto}
  .section-header{grid-column:1 / -1}
  .shelf-subhead{grid-column:1 / -1}
  .setup,.count-stats,.jump-nav,.search-wrap{max-width:1000px;margin-left:auto;margin-right:auto}
  .save-bar>*{max-width:1000px}
}
.product-meta{font-size:11px;color:var(--text3);margin-top:4px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;row-gap:5px}
.product-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;flex-shrink:0}
.tag-beer{background:rgba(255,159,10,0.15);color:var(--orange)}
.tag-liquor{background:rgba(255,69,58,0.15);color:var(--red)}
.tag-wine{background:rgba(191,90,242,0.15);color:var(--purple)}
.tag-food{background:rgba(48,209,88,0.15);color:var(--green)}
.tag-na_beverages{background:rgba(10,132,255,0.15);color:var(--blue)}
.tag-other,.tag-supplies{background:rgba(255,255,255,0.08);color:var(--text3)}

.qty-input{width:62px;padding:11px 6px;background:var(--card2);border:1.5px solid var(--border);
  border-radius:10px;color:var(--text);font-size:18px;font-weight:700;text-align:center;
  outline:none;-moz-appearance:textfield;flex-shrink:0}
.qty-input::-webkit-inner-spin-button,.qty-input::-webkit-outer-spin-button{-webkit-appearance:none}
.qty-input:focus{border-color:var(--blue);background:rgba(10,132,255,0.08)}
.qty-input.has-value{border-color:var(--green);background:rgba(48,209,88,0.08)}
.qty-unit{font-size:10px;color:var(--text3);font-weight:600;text-align:center;width:62px;flex-shrink:0;margin-top:3px}
.product-prev{font-size:10px;color:var(--text3)}
.product-prev b{color:var(--text2)}

/* Jump nav - floating pills to jump between sections */
.jump-nav{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;scrollbar-width:none;
  -webkit-overflow-scrolling:touch}
.jump-nav::-webkit-scrollbar{display:none}
.jump-pill{padding:7px 12px;border-radius:16px;background:var(--card);border:1px solid var(--border);
  color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;
  flex-shrink:0;transition:all 0.15s}
.jump-pill.active{border-color:var(--blue);background:rgba(10,132,255,0.12);color:var(--blue)}

/* Save bar */
.save-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px calc(var(--safe-bottom) + 12px);
  background:rgba(10,10,12,0.92);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;z-index:99}
.save-info{flex:1;font-size:12px;color:var(--text2)}
.save-info b{color:var(--text);font-weight:700}
.save-btn{padding:12px 28px;border-radius:12px;background:var(--green);color:#000;
  font-size:15px;font-weight:700;border:none;cursor:pointer;transition:all 0.15s}
.save-btn:active{transform:scale(0.97)}
.save-btn:disabled{opacity:0.35;cursor:not-allowed}
.discard-btn{padding:12px 16px;border-radius:12px;background:var(--card);color:var(--red);
  font-size:13px;font-weight:600;border:1px solid rgba(255,69,58,0.3);cursor:pointer}

/* History */
.history-card{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:16px;margin-bottom:10px}
.history-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.history-date{font-size:14px;font-weight:700}
.history-badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px}
.badge-complete{background:rgba(48,209,88,0.15);color:var(--green)}
.history-meta{font-size:12px;color:var(--text2)}

.empty{padding:60px 20px;text-align:center}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:0.3}
.empty-text{font-size:15px;color:var(--text2);line-height:1.6}

.toast{position:fixed;top:calc(var(--safe-top) + 80px);left:50%;transform:translateX(-50%) translateY(-20px);
  background:var(--green);color:#000;padding:12px 24px;border-radius:12px;font-size:14px;
  font-weight:700;opacity:0;transition:all 0.3s;z-index:200;pointer-events:none;
  box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.error{background:var(--red);color:#fff}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade-up{animation:fadeUp 0.25s ease both}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-left">
      <div class="hdr-logo">RN</div>
      <div>
        <div class="hdr-title">Inventory Count</div>
        <div class="hdr-sub" id="count-location-label">SELECT LOCATION</div>
      </div>
    </div>
    <a href="/manage" class="back-btn">← Back</a>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- ========== SETUP ========== -->
<div class="setup" id="setup-screen">
  <div class="setup-title">New Count</div>
  <div class="setup-sub">Pick a location to start counting. Products are organized by storage area in shelf order.</div>

  <div class="setup-card">
    <div class="setup-label">Location</div>
    <div class="loc-grid">
      <button class="loc-btn" data-loc="dennis" onclick="pickLoc(this)">Dennis Port</button>
      <button class="loc-btn" data-loc="chatham" onclick="pickLoc(this)">Chatham</button>
    </div>
  </div>

  <button class="start-btn" id="start-btn" disabled onclick="startCount()">Start Count</button>

  <div style="margin-top:32px">
    <div class="setup-label" style="padding:0 4px">Recent Counts</div>
    <div id="history-list">
      <div class="empty" style="padding:30px 0"><div class="empty-icon">📋</div><div class="empty-text">No counts yet</div></div>
    </div>
  </div>
</div>

<!-- ========== COUNT ========== -->
<div class="count-screen" id="count-screen">
  <div class="nav-bar" id="nav-bar"></div>

  <div class="search-wrap" id="search-wrap" style="display:none">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input class="search-input" id="search" placeholder="Search this shelf..." oninput="renderShelf()">
  </div>

  <div class="product-list" id="product-list"></div>

  <div class="save-bar">
    <button class="discard-btn" onclick="discardCount()">✕</button>
    <div class="save-info"><b id="counted-num">0</b> of <span id="total-num">0</span> counted <span id="conn-dot" style="font-size:11px;font-weight:700;margin-left:6px"></span></div>
    <button class="save-btn" id="save-btn" onclick="saveCount()">Save Count</button>
  </div>
</div>

<!-- Add item to the current shelf -->
<div class="ai-ov" id="ai-ov">
  <div class="ai-head">
    <input class="ai-search" id="ai-search" placeholder="Search a product, or type a new name…" oninput="aiRender()">
    <button class="ai-close" onclick="closeAddItem()">Done</button>
  </div>
  <div class="ai-results" id="ai-results"></div>
</div>

<script>
const S = { location: null, sections: [], counts: {}, countId: null, totalProducts: 0 };

// Count type comes from the URL (?type=food | ?type=booze). No param = full count (unchanged).
const COUNT_TYPE = (new URLSearchParams(location.search).get('type') || 'all').toLowerCase();
const BOOZE_CATS = ['BEER', 'LIQUOR', 'WINE'];
const TYPE_LABEL = COUNT_TYPE === 'food' ? 'Food' : COUNT_TYPE === 'booze' ? 'Booze' : 'Full';
const TYPE_NOTE  = COUNT_TYPE === 'food' ? 'Food count' : COUNT_TYPE === 'booze' ? 'Booze count' : 'Full count';
function inCountType(cat) {
  if (COUNT_TYPE === 'all') return true;
  const isBooze = BOOZE_CATS.includes((cat || '').toUpperCase());
  return COUNT_TYPE === 'booze' ? isBooze : !isBooze;
}

function pickLoc(el) {
  document.querySelectorAll('.loc-btn').forEach(b => b.classList.remove('sel'));
  el.classList.add('sel');
  S.location = el.dataset.loc;
  document.getElementById('start-btn').disabled = false;
}

// ============================================
// OFFLINE PERSISTENCE  (count works in the walk-in dead zone)
// ============================================
function lsKey(loc){ return 'rn_count_' + loc + '_' + COUNT_TYPE; }
function saveLocal(){
  if (!S.location) return;
  try { localStorage.setItem(lsKey(S.location), JSON.stringify({ sheet:S.sections, counts:S.counts, countId:S.countId, total:S.totalProducts, ts:Date.now() })); } catch(e){}
}
function loadLocal(loc){ try { return JSON.parse(localStorage.getItem(lsKey(loc)) || 'null'); } catch(e){ return null; } }
function clearLocal(loc){ try { localStorage.removeItem(lsKey(loc)); } catch(e){} }
function pendingCount(){ try { return JSON.parse(localStorage.getItem('rn_count_pending') || '[]').length; } catch(e){ return 0; } }
function queuePending(payload){ try { var q = JSON.parse(localStorage.getItem('rn_count_pending') || '[]'); q.push(payload); localStorage.setItem('rn_count_pending', JSON.stringify(q)); } catch(e){} }
async function flushPending(){
  var q; try { q = JSON.parse(localStorage.getItem('rn_count_pending') || '[]'); } catch(e){ q = []; }
  if (!q.length) return;
  var remain = [], synced = 0;
  for (var i=0; i<q.length; i++){
    var p = q[i];
    try {
      var cr = await fetch('/api/inventory/counts', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({location:p.location, notes:p.notes})});
      var cid = (await cr.json()).id;
      var r = await fetch('/api/inventory/counts/batch', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({count_id:cid, location:p.location, items:p.items})});
      if (!r.ok) throw new Error();
      synced++;
    } catch(e){ remain.push(p); }
  }
  try { localStorage.setItem('rn_count_pending', JSON.stringify(remain)); } catch(e){}
  updateConn();
  if (synced) showToast('✓ Synced ' + synced + ' saved count' + (synced>1?'s':''));
}
function updateConn(){
  var el = document.getElementById('conn-dot'); if (!el) return;
  var on = navigator.onLine, pend = pendingCount();
  el.textContent = (on ? '● Online' : '● Offline') + (pend ? (' · ' + pend + ' to sync') : '');
  el.style.color = on ? (pend ? 'var(--orange)' : 'var(--green)') : 'var(--red)';
}
window.addEventListener('online', function(){ updateConn(); flushPending(); });
window.addEventListener('offline', updateConn);

// ============================================
// START COUNT
// ============================================
async function startCount() {
  if (!S.location) return;
  document.getElementById('count-location-label').textContent = S.location === 'dennis' ? 'DENNIS PORT' : 'CHATHAM';

  // Resume an in-progress count saved on this device (survives reload / dead zone).
  const saved = loadLocal(S.location);
  if (saved && saved.counts && Object.keys(saved.counts).length) {
    if (confirm('You have an in-progress ' + TYPE_LABEL.toLowerCase() + ' count here with ' + Object.keys(saved.counts).length + ' items counted.\n\nResume it?  (Cancel = start a new count)')) {
      S.sections = saved.sheet || [];
      S.counts = saved.counts || {};
      S.countId = saved.countId || null;
      S.totalProducts = saved.total || S.sections.reduce((s, sec) => s + (sec.products || []).length, 0);
      S.view = 'areas'; S.areaIdx = null; S.shelfKey = null;
      document.getElementById('setup-screen').style.display = 'none';
      document.getElementById('count-screen').style.display = 'block';
      document.getElementById('total-num').textContent = S.totalProducts;
      render(); updateProgress(); updateConn();
      return;
    }
    clearLocal(S.location);
  }

  // Load count sheet — fall back to the last cached sheet if we're offline.
  try {
    const res = await fetch('/api/storage/count-sheet?location=' + S.location);
    S.sections = await res.json();
  } catch(e) {
    if (saved && saved.sheet && saved.sheet.length) { S.sections = saved.sheet; showToast('Offline — using last loaded sheet', true); }
    else { showToast('Need a connection to load the count sheet the first time', true); return; }
  }

  // Filter to the selected count type (food / booze) and drop areas left empty.
  if (COUNT_TYPE !== 'all') {
    S.sections = S.sections
      .map(sec => Object.assign({}, sec, { products: (sec.products || []).filter(p => inCountType(p.category)) }))
      .filter(sec => sec.products.length > 0);
  }

  if (S.sections.length === 0) {
    const what = COUNT_TYPE !== 'all' ? TYPE_LABEL.toLowerCase() + ' ' : '';
    showToast('No ' + what + 'products assigned to storage areas. Go to Storage Layout to set up.', true);
    return;
  }

  // Session is created on SAVE (not on start). Blank = not counted, 0 = counted-out.
  S.countId = null;
  S.counts = {};
  S.totalProducts = S.sections.reduce((sum, sec) => sum + sec.products.length, 0);
  S.view = 'areas'; S.areaIdx = null; S.shelfKey = null;
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('count-screen').style.display = 'block';
  document.getElementById('total-num').textContent = S.totalProducts;
  saveLocal();
  render(); updateProgress(); updateConn();
}

function sectionIcon(name) {
  const n = name.toLowerCase();
  if (n.includes('walk-in') || n.includes('cooler')) return '❄️';
  if (n.includes('freezer')) return '🧊';
  if (n.includes('bar')) return '🍸';
  if (n.includes('dry')) return '📦';
  if (n.includes('front') || n.includes('line')) return '🍳';
  return '📍';
}

// ============================================
// DRILL-DOWN RENDER:  areas → shelves → shelf items
// ============================================
function counted(p){ return S.counts[p.id] !== undefined; }
function shelfItems(sec, key){
  if (key === 'un') return (sec.products || []).filter(p => !p.section_id);
  return (sec.products || []).filter(p => String(p.section_id) === String(key));
}
function pct(items){ return items.length ? Math.round(items.filter(counted).length / items.length * 100) : 0; }
function pctClass(p){ return p >= 100 ? 'done-100' : p > 0 ? 'done-part' : 'done-0'; }

function render(){
  if (S.view === 'shelf')   return renderShelf();
  if (S.view === 'shelves') return renderShelves();
  return renderAreas();
}
function navBar(html){ document.getElementById('nav-bar').innerHTML = html; }

function renderAreas(){
  document.getElementById('search-wrap').style.display = 'none';
  const overall = pct(S.sections.flatMap(s => s.products));
  navBar('<div class="nav-title"><div class="t">' + TYPE_LABEL + ' Count · ' + (S.location === 'dennis' ? 'Dennis' : 'Chatham') + '</div>' +
    '<div class="s">Pick an area</div></div><div class="nav-pct ' + pctClass(overall) + '">' + overall + '%</div>');
  document.getElementById('product-list').innerHTML = S.sections.map((sec, i) => {
    const items = sec.products, p = pct(items), c = items.filter(counted).length;
    return '<div class="drill" onclick="goShelves(' + i + ')"><div class="drill-main">' +
      '<div class="drill-name">' + sectionIcon(sec.location_name) + ' ' + esc(sec.location_name) + '</div>' +
      '<div class="drill-sub">' + c + ' of ' + items.length + ' counted</div>' +
      '<div class="pbar"><i style="width:' + p + '%"></i></div></div>' +
      '<div class="drill-pct ' + pctClass(p) + '">' + p + '%</div><div class="chev">›</div></div>';
  }).join('');
}

function renderShelves(){
  document.getElementById('search-wrap').style.display = 'none';
  const sec = S.sections[S.areaIdx]; if (!sec) return renderAreas();
  const ap = pct(sec.products);
  navBar('<button class="nav-back" onclick="goAreas()">‹</button><div class="nav-title">' +
    '<div class="t">' + sectionIcon(sec.location_name) + ' ' + esc(sec.location_name) + '</div><div class="s">Pick a shelf</div></div>' +
    '<div class="nav-pct ' + pctClass(ap) + '">' + ap + '%</div>');
  const shelves = (sec.sections || []).map(s => ({ key: s.id, name: s.name }));
  if (shelfItems(sec, 'un').length) shelves.push({ key: 'un', name: 'Unshelved' });
  document.getElementById('product-list').innerHTML = shelves.length ? shelves.map(sh => {
    const items = shelfItems(sec, sh.key), p = pct(items), c = items.filter(counted).length;
    return '<div class="drill" onclick="goShelf(\'' + sh.key + '\')"><div class="drill-main">' +
      '<div class="drill-name">' + esc(sh.name) + '</div><div class="drill-sub">' + c + ' of ' + items.length + ' counted</div>' +
      '<div class="pbar"><i style="width:' + p + '%"></i></div></div>' +
      '<div class="drill-pct ' + pctClass(p) + '">' + p + '%</div><div class="chev">›</div></div>';
  }).join('') : '<div class="empty"><div class="empty-text">No shelves in this area.</div></div>';
}

function renderShelf(){
  const sec = S.sections[S.areaIdx]; if (!sec) return renderAreas();
  document.getElementById('search-wrap').style.display = 'block';
  const search = (document.getElementById('search').value || '').toLowerCase();
  let items = shelfItems(sec, S.shelfKey);
  const shName = S.shelfKey === 'un' ? 'Unshelved' : (((sec.sections || []).find(s => String(s.id) === String(S.shelfKey)) || {}).name || 'Shelf');
  const p = pct(items);
  navBar('<button class="nav-back" onclick="goShelves(' + S.areaIdx + ')">‹</button><div class="nav-title">' +
    '<div class="t">' + esc(shName) + '</div><div class="s">' + esc(sec.location_name) + '</div></div>' +
    '<div class="nav-pct ' + pctClass(p) + '" id="shelf-pct">' + p + '%</div>');
  if (search && !S.reorder) items = items.filter(x => ((x.name||'') + ' ' + (x.display_name||'')).toLowerCase().includes(search));
  const topBar = S.reorder
    ? '<div class="shelf-actions"><button class="sa-done" onclick="toggleReorder()">✓ Done arranging</button></div>'
    : '<div class="shelf-actions"><button class="sa-btn sa-add" onclick="openAddItem()">+ Add item</button>' +
      '<button class="sa-btn sa-arrange" onclick="toggleReorder()">↕ Arrange</button></div>';
  const rowsHtml = items.length
    ? items.map((x, i) => S.reorder ? arrangeRowHtml(x, i, items.length) : productRowHtml(x, i)).join('')
    : '<div class="empty"><div class="empty-text">No items here yet — add one above.</div></div>';
  document.getElementById('product-list').innerHTML = topBar + rowsHtml;
}

function arrangeRowHtml(p, i, n){
  return '<div class="product-row" style="align-items:center">' +
    '<div class="product-info"><div class="product-name">' + esc(p.display_name || p.name) + '</div>' +
      '<div class="product-meta"><span class="unit-chip">count: ' + esc(p.inventory_unit || p.unit || 'ea') + '</span></div></div>' +
    '<div class="arrange-btns">' +
      '<button class="step-btn" onclick="moveItem(' + p.id + ',-1)" ' + (i === 0 ? 'disabled' : '') + '>▲</button>' +
      '<button class="step-btn" onclick="moveItem(' + p.id + ',1)" ' + (i === n - 1 ? 'disabled' : '') + '>▼</button>' +
      '<button class="step-btn rm-btn" onclick="removeFromShelf(' + p.id + ')" title="Remove from area">✕</button>' +
    '</div></div>';
}
function toggleReorder(){ S.reorder = !S.reorder; document.getElementById('search').value = ''; render(); }
function moveItem(pid, dir){
  const area = S.sections[S.areaIdx]; if (!area) return;
  const shelfList = shelfItems(area, S.shelfKey);
  const idx = shelfList.findIndex(p => p.id === pid);
  const j = idx + dir;
  if (idx < 0 || j < 0 || j >= shelfList.length) return;
  const aPos = area.products.indexOf(shelfList[idx]);
  const bPos = area.products.indexOf(shelfList[j]);
  const tmp = area.products[aPos]; area.products[aPos] = area.products[bPos]; area.products[bPos] = tmp;
  render();
  saveLocal();
  persistOrder(area);
}
async function removeFromShelf(pid){
  const area = S.sections[S.areaIdx]; if (!area) return;
  const item = area.products.find(p => p.id === pid);
  if (!confirm('Remove "' + (item ? (item.display_name || item.name) : 'this item') + '" from this area?\n\nIt stays in the catalog but won\'t be counted here.')) return;
  try {
    await fetch('/api/storage/locations/' + area.location_id + '/products/' + pid, { method:'DELETE', credentials:'include' });
    const idx = area.products.findIndex(p => p.id === pid);
    if (idx >= 0) { area.products.splice(idx, 1); S.totalProducts = Math.max(0, S.totalProducts - 1); delete S.counts[pid]; }
    render(); updateProgress(); saveLocal();
    showToast('Removed from area');
  } catch(e) { showToast('Could not remove', true); }
}
function persistOrder(area){
  fetch('/api/storage/locations/' + area.location_id + '/reorder', {
    method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include',
    body: JSON.stringify({ product_ids: area.products.map(p => p.id) })
  }).catch(()=>{});
}

// ---- Add item to the shelf you're on ----
async function ensureCatalog(){
  if (S.catalog) return;
  const all = await fetch('/api/inventory/products', {credentials:'include'}).then(r => r.json()).catch(() => []);
  S.catalog = (all || []).filter(p => p.active !== 0 && inCountType(p.category));
}
async function openAddItem(){
  document.getElementById('ai-ov').classList.add('open');
  document.getElementById('ai-search').value = '';
  document.getElementById('ai-results').innerHTML = '<div style="padding:14px;color:var(--text3)">Loading catalog…</div>';
  await ensureCatalog();
  aiRender();
  document.getElementById('ai-search').focus();
}
function closeAddItem(){ document.getElementById('ai-ov').classList.remove('open'); }
function aiRender(){
  const q = (document.getElementById('ai-search').value || '').trim();
  const ql = q.toLowerCase();
  let list = (S.catalog || []);
  if (ql) list = list.filter(p => (p.name||'').toLowerCase().includes(ql) || (p.display_name||'').toLowerCase().includes(ql));
  list = list.slice(0, 40);
  let html = list.map(p => '<div class="ai-item" onclick="addExistingToShelf(' + p.id + ')"><span>' + esc(p.display_name||p.name) + '</span><span class="ai-add">+ Add</span></div>').join('');
  if (q && !(S.catalog||[]).some(p => (p.display_name||p.name||'').toLowerCase() === ql)) {
    html += '<div class="ai-new" onclick="aiCreate()">+ Create new product “' + esc(q) + '”</div>';
  }
  if (!html) html = '<div style="padding:14px;color:var(--text3)">Type to search products…</div>';
  document.getElementById('ai-results').innerHTML = html;
}
function aiCreate(){ const name = (document.getElementById('ai-search').value || '').trim(); if (name) createAndAddItem(name); }

async function addExistingToShelf(pid){
  const sec = S.sections[S.areaIdx]; if (!sec) return;
  const loc = sec.location_id;
  try {
    await fetch('/api/storage/locations/' + loc + '/products', {method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({product_id:pid})}).catch(()=>{});
    const rows = await fetch('/api/storage/locations/' + loc + '/products', {credentials:'include'}).then(r => r.json());
    const row = (rows || []).find(r => r.id === pid);
    const secId = (S.shelfKey === 'un') ? null : Number(S.shelfKey);
    if (secId != null && row) {
      await fetch('/api/inventory/count/assign-section', {method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({psl_id:row.assignment_id, section_id:secId})});
    }
    const existing = sec.products.find(p => p.id === pid);
    if (existing) { existing.section_id = secId; }
    else {
      const c = (S.catalog || []).find(x => x.id === pid) || {};
      sec.products.push({ id:pid, name:c.name||(row&&row.name)||'Item', display_name:c.display_name, category:c.category, unit:c.unit, inventory_unit:c.inventory_unit, current_price:c.current_price, section_id:secId, current_qty:null });
      S.totalProducts++;
    }
    closeAddItem(); render(); updateProgress(); saveLocal();
    showToast('Added to shelf');
  } catch(e) { showToast('Could not add item', true); }
}
async function createAndAddItem(name){
  const cat = COUNT_TYPE === 'booze' ? 'BEER' : 'FOOD';
  try {
    const r = await fetch('/api/inventory/products', {method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({name:name, category:cat})});
    const d = await r.json(); const pid = d.id || d.product_id;
    if (!pid) throw new Error();
    await fetch('/api/storage/product/' + pid + '/units', {method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',body:JSON.stringify({active:true})}).catch(()=>{});
    S.catalog = S.catalog || []; S.catalog.push({ id:pid, name:name, category:cat });
    await addExistingToShelf(pid);
  } catch(e) { showToast('Could not create product', true); }
}

function goAreas(){ S.view = 'areas'; S.areaIdx = null; S.shelfKey = null; S.reorder = false; document.getElementById('search').value = ''; render(); }
function goShelves(idx){ S.view = 'shelves'; S.areaIdx = idx; S.shelfKey = null; S.reorder = false; document.getElementById('search').value = ''; render(); }
function goShelf(key){ S.view = 'shelf'; S.shelfKey = key; S.reorder = false; render(); }

function productRowHtml(p, i) {
  const val = S.counts[p.id] !== undefined ? S.counts[p.id] : '';
  const hasVal = val !== '';
  const prev = p.current_qty;
  const unit = p.inventory_unit || p.unit || 'ea';
  const prevHtml = prev !== null && prev !== undefined ? '<span class="product-prev">Last: <b>' + prev + '</b></span>' : '';
  return '<div class="product-row fade-up" style="animation-delay:' + Math.min(i * 10, 200) + 'ms">' +
    '<div class="product-info">' +
      '<div class="product-name" onclick="editFromCount(' + p.id + ')" style="cursor:pointer">' + esc(p.display_name || p.name) + ' <span style="color:var(--text3);font-size:11px;font-weight:400">✎</span></div>' +
      '<div class="product-meta">' +
        '<span class="unit-chip" onclick="editFromCount(' + p.id + ')" style="cursor:pointer">count: ' + esc(unit) + '</span>' + prevHtml +
        '<button class="out-btn" onclick="markOut(' + p.id + ')">Out (0)</button>' +
      '</div>' +
    '</div>' +
    '<div class="qty-stepper">' +
      '<button class="step-btn" onclick="stepQty(' + p.id + ',-1)" aria-label="minus">−</button>' +
      '<div class="qty-wrap">' +
        '<input class="qty-input' + (hasVal ? ' has-value' : '') + '" type="number" inputmode="decimal" step="0.5" ' +
          'placeholder="—" value="' + val + '" onfocus="this.select()" oninput="setQty(' + p.id + ',this)" data-pid="' + p.id + '">' +
        '<div class="qty-unit">' + esc(unit) + '</div>' +
        '<button class="half-btn" onclick="stepQty(' + p.id + ',0.25)">+¼</button>' +
      '</div>' +
      '<button class="step-btn" onclick="stepQty(' + p.id + ',1)" aria-label="plus">+</button>' +
    '</div>' +
  '</div>';
}

// Edit a product (count unit, name, conversions, archive) from the count screen — shared card.
function editFromCount(pid){
  if (typeof openProductEditor !== 'function') { showToast('Editor not loaded', true); return; }
  openProductEditor(pid, { onSaved: function(p, meta){
    for (const sec of S.sections){
      const idx = sec.products.findIndex(x => x.id === pid);
      if (idx >= 0){
        if (meta && meta.archived){ sec.products.splice(idx, 1); S.totalProducts = Math.max(0, S.totalProducts - 1); delete S.counts[pid]; }
        else if (p){ Object.assign(sec.products[idx], { name:p.name, display_name:p.display_name, category:p.category, unit:p.unit, inventory_unit:p.inventory_unit, current_price:p.current_price }); }
        break;
      }
    }
    render(); updateProgress();
  }});
}

function markOut(pid){
  const el = document.querySelector('.qty-input[data-pid="' + pid + '"]');
  if (el){ el.value = 0; setQty(pid, el); }
  else { S.counts[pid] = 0; updateProgress(); }
}

function stepQty(pid, delta) {
  const el = document.querySelector('.qty-input[data-pid="' + pid + '"]');
  if (!el) return;
  let v = parseFloat(el.value); if (isNaN(v)) v = 0;
  v = Math.max(0, Math.round((v + delta) * 100) / 100);
  el.value = v; setQty(pid, el);
}

function setQty(pid, el) {
  const v = el.value.trim();
  if (v === '') { delete S.counts[pid]; el.classList.remove('has-value'); }
  else { S.counts[pid] = parseFloat(v); el.classList.add('has-value'); }
  updateProgress();
  saveLocal();
}

function updateProgress() {
  document.getElementById('counted-num').textContent = Object.keys(S.counts).length;
  document.getElementById('total-num').textContent = S.totalProducts;
  if (S.view === 'shelf') {
    const sec = S.sections[S.areaIdx];
    const el = document.getElementById('shelf-pct');
    if (sec && el) { const p = pct(shelfItems(sec, S.shelfKey)); el.textContent = p + '%'; el.className = 'nav-pct ' + pctClass(p); }
  }
}

// ============================================
// SAVE
// ============================================
async function saveCount() {
  const counted = Object.keys(S.counts).length;
  if (counted === 0) { showToast('No items counted yet', true); return; }
  const blanks = S.totalProducts - counted;
  if (blanks > 0 && !confirm(blanks + ' item' + (blanks === 1 ? '' : 's') + ' still blank (not counted). Anything you\'re OUT of should be entered as 0, not left blank.\n\nSave anyway?')) return;

  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Saving...';

  // Build items first so we can queue them even with no connection.
  const items = [];
  for (const [pid, qty] of Object.entries(S.counts)) {
    let unit = 'ea';
    for (const sec of S.sections) {
      const prod = sec.products.find(p => p.id == pid);
      if (prod) { unit = prod.inventory_unit || prod.unit || 'ea'; break; }
    }
    items.push({ product_id: parseInt(pid), quantity: qty, unit });
  }

  function finish(msg, err) {
    showToast(msg, err);
    clearLocal(S.location);
    S.counts = {};
    updateConn();
    setTimeout(() => {
      document.getElementById('count-screen').style.display = 'none';
      document.getElementById('setup-screen').style.display = 'block';
      document.getElementById('count-location-label').textContent = 'SELECT LOCATION';
      btn.disabled = false; btn.textContent = 'Save Count';
      loadHistory();
    }, 1200);
  }

  try {
    if (!S.countId) {
      const cr = await fetch('/api/inventory/counts', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({location:S.location, notes:TYPE_NOTE})});
      if (!cr.ok) throw new Error(); S.countId = (await cr.json()).id;
    }
    const res = await fetch('/api/inventory/counts/batch', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({count_id:S.countId, location:S.location, items})});
    if (!res.ok) throw new Error();
    finish('✓ ' + counted + ' items saved!');
  } catch(e) {
    // Offline or the save failed — keep it on the device and upload when back online.
    queuePending({ location: S.location, notes: TYPE_NOTE, items: items, ts: Date.now() });
    finish('Saved on this device — will upload when back online');
  }
}

function discardCount() {
  if (Object.keys(S.counts).length > 0 && !confirm('Discard this count?')) return;
  if (S.location) clearLocal(S.location);
  document.getElementById('count-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'block';
  document.getElementById('count-location-label').textContent = 'SELECT LOCATION';
  document.getElementById('search').value = '';
  S.counts = {};
}

// ============================================
// HISTORY
// ============================================
function countTypeOf(c) {
  const n = (c.notes || '').toLowerCase();
  if (n.indexOf('booze') !== -1) return 'Booze';
  if (n.indexOf('food') !== -1) return 'Food';
  return 'Full';
}

async function loadHistory() {
  try {
    const res = await fetch('/api/inventory/counts/history');
    let data = await res.json();
    // Hide empty/abandoned sessions (0 items) — only real saved counts.
    data = data.filter(c => (c.item_count || 0) > 0);
    // On a Food/Booze page, only show that type's counts.
    if (COUNT_TYPE !== 'all') data = data.filter(c => countTypeOf(c).toLowerCase() === COUNT_TYPE);
    const el = document.getElementById('history-list');
    if (!data.length) {
      el.innerHTML = '<div class="empty" style="padding:30px 0"><div class="empty-icon">📋</div><div class="empty-text">No ' +
        (COUNT_TYPE !== 'all' ? TYPE_LABEL.toLowerCase() + ' ' : '') + 'counts yet</div></div>';
      return;
    }
    el.innerHTML = data.slice(0, 10).map(c => {
      const d = new Date(c.created_at);
      const dateStr = d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
      const timeStr = d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
      const loc = c.location === 'dennis' ? 'Dennis' : 'Chatham';
      const typ = countTypeOf(c);
      return '<div class="history-card"><div class="history-top">' +
        '<div class="history-date">' + dateStr + ' · ' + timeStr + '</div>' +
        '<span class="history-badge badge-complete">Complete</span>' +
        '</div><div class="history-meta">' + loc + ' · ' + typ + ' · ' + (c.item_count || 0) + ' items</div></div>';
    }).join('');
  } catch(e) {}
}

function catLabel(c) { return {BEER:'Beer',LIQUOR:'Liquor',WINE:'Wine',FOOD:'Food',NA_BEVERAGES:'NA Bev',OTHER:'Other',SUPPLIES:'Supplies'}[c]||c; }
function esc(s) { const d=document.createElement('div');d.textContent=s;return d.innerHTML; }
function showToast(msg,isError) {
  const t=document.getElementById('toast');t.textContent=msg;
  t.className='toast show'+(isError?' error':'');setTimeout(()=>t.className='toast',2500);
}
// Reflect the count type in the page title / intro.
if (COUNT_TYPE !== 'all') {
  const emoji = COUNT_TYPE === 'booze' ? '🍸 ' : '🍴 ';
  const st = document.querySelector('.setup-title'); if (st) st.textContent = 'New ' + TYPE_LABEL + ' Count';
  const ht = document.querySelector('.hdr-title');   if (ht) ht.textContent = emoji + TYPE_LABEL + ' Count';
  const ss = document.querySelector('.setup-sub');   if (ss) ss.textContent =
    'Counting ' + TYPE_LABEL.toLowerCase() + ' only — ' +
    (COUNT_TYPE === 'booze' ? 'beer, liquor & wine.' : 'food, NA beverages & supplies.') +
    ' Pick a location to start.';
}
loadHistory();
updateConn();
if (navigator.onLine) flushPending();
</script>
