<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Print Checks — Red Nun</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #020617; --bg-card: #0f172a; --bg-elevated: #1e293b;
  --border: #1e293b; --border-focus: #334155;
  --text: #e2e8f0; --text2: #94a3b8; --text3: #475569;
  --green: #22c55e; --green-soft: rgba(34,197,94,0.12);
  --red: #ef4444; --red-soft: rgba(239,68,68,0.12);
  --blue: #38bdf8; --blue-soft: rgba(56,189,248,0.12);
  --amber: #f59e0b; --amber-soft: rgba(245,158,11,0.12);
  --purple: #a78bfa; --purple-soft: rgba(167,139,250,0.12);
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }

.layout { display: flex; height: 100vh; }
.sidebar-container { width: 240px; flex-shrink: 0; }
.main-content { flex: 1; overflow-y: auto; padding: 24px; }
.content-wrap { max-width: 1100px; }

.page-header { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
.page-title { font-size: 22px; font-weight: 700; }
.page-sub { font-size: 13px; color: var(--text3); margin-top: 4px; }

.loc-toggle { display: inline-flex; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.loc-toggle button { padding: 8px 16px; border: none; background: transparent; color: var(--text2); font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--font); }
.loc-toggle button.active { background: var(--blue); color: #000; font-weight: 600; }

.summary-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.summary-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; flex: 1; min-width: 130px; }
.summary-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
.summary-value { font-size: 24px; font-weight: 700; margin-top: 4px; }
.summary-value.blue { color: var(--blue); }
.summary-value.green { color: var(--green); }

.action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 12px; flex-wrap: wrap; }
.action-left { display: flex; gap: 8px; align-items: center; font-size: 13px; color: var(--text2); }
.btn-print { padding: 9px 18px; border-radius: 8px; border: 1px solid var(--blue); background: var(--blue); color: #000; font-weight: 600; font-size: 14px; cursor: pointer; }
.btn-print:disabled { background: var(--border); border-color: var(--border); color: var(--text3); cursor: not-allowed; }
.btn-secondary { padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); font-size: 13px; cursor: pointer; }
.btn-secondary:hover { background: var(--bg-elevated); }

.queue-table { width: 100%; border-collapse: collapse; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; font-size: 13px; }
.queue-table th { padding: 10px 12px; text-align: left; color: var(--text3); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border); }
.queue-table td { padding: 12px; border-bottom: 1px solid var(--border); }
.queue-table tbody tr:last-child td { border-bottom: none; }
.queue-table tbody tr:hover { background: rgba(255,255,255,0.02); }
.queue-table .col-cb { width: 36px; text-align: center; }
.queue-table .col-amt { text-align: right; font-variant-numeric: tabular-nums; }
.queue-table input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--blue); }

.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
.badge.ap        { background: var(--blue-soft);   color: var(--blue);   border: 1px solid rgba(56,189,248,0.3); }
.badge.payroll   { background: var(--green-soft);  color: var(--green);  border: 1px solid rgba(34,197,94,0.3); }
.badge.manual    { background: var(--purple-soft); color: var(--purple); border: 1px solid rgba(167,139,250,0.3); }
.badge.recurring { background: var(--amber-soft);  color: var(--amber);  border: 1px solid rgba(245,158,11,0.3); }
.badge.loc       { background: var(--bg-elevated); color: var(--text2);  border: 1px solid var(--border); margin-left: 6px; font-size: 10px; }

.payee { font-weight: 600; color: var(--text); }
.subtitle { color: var(--text3); font-size: 11px; margin-top: 2px; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty-state .big { font-size: 16px; color: var(--text2); margin-bottom: 6px; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(2,6,23,0.85); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.modal-overlay.show { display: flex; }
.modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; max-width: 720px; width: 100%; padding: 24px; max-height: 90vh; display: flex; flex-direction: column; }
.modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.modal .modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
.starter-row { display: flex; align-items: end; gap: 10px; margin-bottom: 14px; }
.starter-row .field { flex: 1; }
.starter-row label { display: block; font-size: 12px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
.starter-row input { width: 100%; padding: 9px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 15px; font-family: var(--font); font-variant-numeric: tabular-nums; }
.starter-row input:focus { outline: none; border-color: var(--blue); }
.starter-row .btn-secondary { white-space: nowrap; padding: 9px 14px; }

.checks-list { flex: 1; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 14px; min-height: 100px; }
.checks-list table { width: 100%; border-collapse: collapse; font-size: 13px; }
.checks-list th { padding: 8px 10px; text-align: left; color: var(--text3); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1; }
.checks-list td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.checks-list tbody tr:last-child td { border-bottom: none; }
.checks-list .col-num { width: 110px; }
.checks-list .col-num input { width: 100%; padding: 6px 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; font-family: var(--font); font-variant-numeric: tabular-nums; }
.checks-list .col-num input:focus { outline: none; border-color: var(--blue); }
.checks-list .col-num input.conflict { border-color: var(--red); background: var(--red-soft); }
.checks-list .col-amt { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
.checks-list .conflict-msg { color: var(--red); font-size: 11px; margin-top: 3px; }

.modal-footer { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
.modal-footer .summary { font-size: 13px; color: var(--text2); }
.modal-footer .summary.warn { color: var(--red); }
.modal-actions { display: flex; gap: 10px; }

.status-msg { margin: 12px 0; padding: 10px 12px; border-radius: 8px; font-size: 13px; }
.status-msg.err { background: var(--red-soft); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
.status-msg.ok  { background: var(--green-soft); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }

@media (max-width: 767px) {
  .layout { display: block; height: auto; }
  .sidebar-container { display: none; }
  .main-content { width: 100%; padding: 16px; overflow-y: visible; }
  .summary-card { min-width: 100px; padding: 12px; }
  .summary-value { font-size: 20px; }
  .queue-table th.hide-mobile, .queue-table td.hide-mobile { display: none; }
  .queue-table th, .queue-table td { padding: 10px; }
}
</style>
<link rel="stylesheet" href="/static/sidebar.css">
</head>
<body>
<div class="layout">
  <div class="sidebar-container" id="sidebar"></div>
  <div class="main-content">
    <div class="content-wrap">

      <div class="page-header">
        <div>
          <div class="page-title">Print Checks</div>
          <div class="page-sub">All checks pending print — vendor, payroll, manual, and recurring bills due now.</div>
        </div>
        <div class="loc-toggle">
          <button id="locChatham" class="active" onclick="setLocation('chatham')">Chatham</button>
          <button id="locDennis" onclick="setLocation('dennis')">Dennis Port</button>
        </div>
      </div>

      <div class="summary-bar">
        <div class="summary-card">
          <div class="summary-label">In queue</div>
          <div class="summary-value" id="sumCount">0</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Total $</div>
          <div class="summary-value green" id="sumTotal">$0.00</div>
        </div>
        <div class="summary-card">
          <div class="summary-label">Next check #</div>
          <div class="summary-value blue" id="sumNext">—</div>
        </div>
      </div>

      <div class="action-bar">
        <div class="action-left">
          <input type="checkbox" id="selectAll" onchange="toggleAll()" style="width:16px;height:16px;accent-color:var(--blue);cursor:pointer;">
          <label for="selectAll" style="cursor:pointer">Select all</label>
          <span id="selectedSummary" style="margin-left:14px;color:var(--text3)">— none selected —</span>
        </div>
        <div>
          <button class="btn-secondary" onclick="loadQueue()">Refresh</button>
          <button class="btn-print" id="btnPrint" disabled onclick="openPrintModal()">Print selected</button>
        </div>
      </div>

      <div id="statusBox"></div>
      <div id="queueWrap"></div>

    </div>
  </div>
</div>

<!-- Print modal -->
<div class="modal-overlay" id="printModal" onclick="if(event.target===this)closePrintModal()">
  <div class="modal">
    <h2>Print checks</h2>
    <div class="modal-sub">Edit any check number before printing. Numbers must be unique across the system.</div>

    <div class="starter-row">
      <div class="field">
        <label for="startNum">Starting check #</label>
        <input type="number" id="startNum" min="1" step="1">
      </div>
      <button class="btn-secondary" onclick="applySequential()">Apply sequentially</button>
    </div>

    <div class="checks-list" id="checksList"></div>

    <div id="modalStatus"></div>

    <div class="modal-footer">
      <div class="summary" id="modalSummary">—</div>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closePrintModal()">Cancel</button>
        <button class="btn-print" id="btnConfirmPrint" onclick="confirmPrint()">Print &amp; download PDF</button>
      </div>
    </div>
  </div>
</div>

<script src="/static/sidebar.js"></script>
<script>
  /* global buildSidebar */
  let state = {
    location: 'chatham',
    items: [],            // queue items from /api/print-queue
    nextCheckNumber: 1001,
    selected: new Set(),  // keys: `${source}:${id}` (id may be string for recurring)
    // Modal state
    modalNumbers: {},     // { key: 'check_number_string' }
    externalConflicts: {},// { number_string: conflict_object } — external dupes
    conflictTimer: null,
  };

  function fmtMoney(n) {
    n = Number(n) || 0;
    return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function key(it) { return `${it.source}:${it.id}`; }
  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function setLocation(loc) {
    state.location = loc;
    state.selected.clear();
    document.getElementById('locChatham').classList.toggle('active', loc === 'chatham');
    document.getElementById('locDennis').classList.toggle('active', loc === 'dennis');
    loadQueue();
  }

  async function loadQueue() {
    setStatus('');
    try {
      const r = await fetch('/api/print-queue?location=' + encodeURIComponent(state.location));
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      state.items = data.items || [];
      state.nextCheckNumber = data.next_check_number || 1001;
      state.selected = new Set([...state.selected].filter(k => state.items.some(it => key(it) === k)));
      await applyPreselectFromUrl();
      render();
    } catch (e) {
      setStatus('Failed to load queue: ' + e.message, 'err');
    }
  }

  async function applyPreselectFromUrl() {
    const params = new URLSearchParams(window.location.search);
    const sel = params.get('select');
    if (!sel) return;
    const wanted = sel.split(',').map(s => s.trim()).filter(Boolean);
    if (!wanted.length) return;
    let existing = new Set(state.items.map(it => key(it)));
    const anyHere = wanted.some(k => existing.has(k));
    if (!anyHere) {
      const other = state.location === 'dennis' ? 'chatham' : 'dennis';
      try {
        const r = await fetch('/api/print-queue?location=' + encodeURIComponent(other));
        if (r.ok) {
          const data = await r.json();
          const otherItems = data.items || [];
          if (wanted.some(k => otherItems.some(it => key(it) === k))) {
            state.location = other;
            state.items = otherItems;
            state.nextCheckNumber = data.next_check_number || state.nextCheckNumber;
            const lc = document.getElementById('locChatham');
            const ld = document.getElementById('locDennis');
            if (lc) lc.classList.toggle('active', other === 'chatham');
            if (ld) ld.classList.toggle('active', other === 'dennis');
            existing = new Set(state.items.map(it => key(it)));
          }
        }
      } catch (e) { /* ignore */ }
    }
    wanted.forEach(k => { if (existing.has(k)) state.selected.add(k); });
    window.history.replaceState({}, '', window.location.pathname);
  }

  function render() {
    document.getElementById('sumCount').textContent = state.items.length;
    const total = state.items.reduce((s, it) => s + (it.amount || 0), 0);
    document.getElementById('sumTotal').textContent = fmtMoney(total);
    document.getElementById('sumNext').textContent = '#' + state.nextCheckNumber;

    const wrap = document.getElementById('queueWrap');
    if (state.items.length === 0) {
      wrap.innerHTML = `
        <div class="empty-state">
          <div class="big">No checks waiting to print</div>
          <div>Pending vendor payments, payroll checks, manual checks, and due recurring bills will appear here.</div>
        </div>`;
      updateSelectionSummary();
      return;
    }

    let html = `
      <table class="queue-table">
        <thead>
          <tr>
            <th class="col-cb"></th>
            <th>Source</th>
            <th>Payee</th>
            <th class="hide-mobile">Date</th>
            <th class="hide-mobile">Memo</th>
            <th class="col-amt">Amount</th>
          </tr>
        </thead>
        <tbody>`;
    for (const it of state.items) {
      const k = key(it);
      const checked = state.selected.has(k) ? 'checked' : '';
      const locBadge = it.location ? `<span class="badge loc">${escapeHtml(it.location)}</span>` : '';
      html += `
        <tr>
          <td class="col-cb"><input type="checkbox" data-key="${escapeHtml(k)}" ${checked} onchange="toggleOne('${escapeHtml(k)}')"></td>
          <td><span class="badge ${it.source}">${it.source}</span>${locBadge}</td>
          <td>
            <div class="payee">${escapeHtml(it.payee || '—')}</div>
            ${it.extra ? `<div class="subtitle">${escapeHtml(it.extra)}</div>` : ''}
          </td>
          <td class="hide-mobile" style="color:var(--text2)">${escapeHtml(it.date || '')}</td>
          <td class="hide-mobile" style="color:var(--text2)">${escapeHtml(it.memo || '')}</td>
          <td class="col-amt">${fmtMoney(it.amount)}</td>
        </tr>`;
    }
    html += '</tbody></table>';
    wrap.innerHTML = html;

    document.getElementById('selectAll').checked =
      state.items.length > 0 && state.selected.size === state.items.length;
    updateSelectionSummary();
  }

  function toggleOne(k) {
    if (state.selected.has(k)) state.selected.delete(k);
    else state.selected.add(k);
    document.getElementById('selectAll').checked =
      state.items.length > 0 && state.selected.size === state.items.length;
    updateSelectionSummary();
  }

  function toggleAll() {
    const all = document.getElementById('selectAll').checked;
    state.selected.clear();
    if (all) state.items.forEach(it => state.selected.add(key(it)));
    document.querySelectorAll('.queue-table input[type="checkbox"][data-key]').forEach(cb => {
      cb.checked = state.selected.has(cb.dataset.key);
    });
    updateSelectionSummary();
  }

  function updateSelectionSummary() {
    const n = state.selected.size;
    const total = [...state.selected].reduce((s, k) => {
      const it = state.items.find(x => key(x) === k);
      return s + (it ? it.amount : 0);
    }, 0);
    const el = document.getElementById('selectedSummary');
    if (n === 0) el.textContent = '— none selected —';
    else el.textContent = `${n} selected · ${fmtMoney(total)}`;
    document.getElementById('btnPrint').disabled = (n === 0);
  }

  // ── Modal ───────────────────────────────────────────────────────────────────

  function selectedItemsInOrder() {
    return state.items.filter(it => state.selected.has(key(it)));
  }

  function openPrintModal() {
    const sel = selectedItemsInOrder();
    if (sel.length === 0) return;

    // Pre-assign sequential numbers from the suggested next #
    state.modalNumbers = {};
    let n = state.nextCheckNumber;
    for (const it of sel) {
      state.modalNumbers[key(it)] = String(n);
      n++;
    }
    state.externalConflicts = {};

    document.getElementById('startNum').value = state.nextCheckNumber;
    renderChecksList();
    refreshModalSummary();
    document.getElementById('modalStatus').innerHTML = '';
    document.getElementById('printModal').classList.add('show');
    setTimeout(() => document.getElementById('startNum').focus(), 50);
    queueConflictCheck();
  }

  function closePrintModal() {
    document.getElementById('printModal').classList.remove('show');
    if (state.conflictTimer) { clearTimeout(state.conflictTimer); state.conflictTimer = null; }
  }

  function applySequential() {
    const start = parseInt(document.getElementById('startNum').value, 10);
    if (isNaN(start) || start <= 0) return;
    const sel = selectedItemsInOrder();
    let n = start;
    for (const it of sel) {
      state.modalNumbers[key(it)] = String(n);
      n++;
    }
    renderChecksList();
    refreshModalSummary();
    queueConflictCheck();
  }

  function renderChecksList() {
    const sel = selectedItemsInOrder();
    let html = `
      <table>
        <thead>
          <tr>
            <th class="col-num">Check #</th>
            <th>Source</th>
            <th>Payee</th>
            <th class="col-amt">Amount</th>
          </tr>
        </thead>
        <tbody>`;
    for (const it of sel) {
      const k = key(it);
      const num = state.modalNumbers[k] || '';
      const conflictMsg = conflictMessageForKey(k, num);
      const conflictClass = conflictMsg ? ' conflict' : '';
      html += `
        <tr>
          <td class="col-num">
            <input type="number" min="1" step="1" data-key="${escapeHtml(k)}" value="${escapeHtml(num)}" class="${conflictClass}" oninput="onCheckNumberChange('${escapeHtml(k)}', this.value)">
            ${conflictMsg ? `<div class="conflict-msg">${escapeHtml(conflictMsg)}</div>` : ''}
          </td>
          <td><span class="badge ${it.source}">${it.source}</span></td>
          <td>
            <div class="payee">${escapeHtml(it.payee || '—')}</div>
            ${it.extra ? `<div class="subtitle">${escapeHtml(it.extra)}</div>` : ''}
          </td>
          <td class="col-amt">${fmtMoney(it.amount)}</td>
        </tr>`;
    }
    html += '</tbody></table>';
    document.getElementById('checksList').innerHTML = html;
  }

  function onCheckNumberChange(k, value) {
    state.modalNumbers[k] = String(value || '').trim();
    refreshModalSummary();
    // Re-render only inline conflict messages without losing focus — easiest:
    // update just the input className based on current state, defer full conflict
    // refresh to debounce.
    queueConflictCheck();
  }

  function withinBatchDuplicates() {
    // Returns map: number_string -> count (only those with count > 1)
    const counts = {};
    for (const k of Object.keys(state.modalNumbers)) {
      const n = state.modalNumbers[k];
      if (!n) continue;
      counts[n] = (counts[n] || 0) + 1;
    }
    const dupes = {};
    for (const n of Object.keys(counts)) {
      if (counts[n] > 1) dupes[n] = counts[n];
    }
    return dupes;
  }

  function conflictMessageForKey(k, num) {
    const v = String(num || '').trim();
    if (!v) return 'Enter a check #';
    if (!/^\d+$/.test(v) || parseInt(v, 10) <= 0) return 'Must be a positive number';
    const dupes = withinBatchDuplicates();
    if (dupes[v]) return `Duplicate within this batch (${dupes[v]} uses)`;
    const ext = state.externalConflicts[v];
    if (ext) {
      const where = ext.source + (ext.location ? ` · ${ext.location}` : '');
      return `Already used by ${where} for ${ext.payee || '?'}`;
    }
    return null;
  }

  function refreshModalSummary() {
    const sel = selectedItemsInOrder();
    const n = sel.length;
    const conflicts = sel.reduce((acc, it) => {
      const k = key(it);
      return acc + (conflictMessageForKey(k, state.modalNumbers[k]) ? 1 : 0);
    }, 0);
    const summary = document.getElementById('modalSummary');
    if (conflicts > 0) {
      summary.textContent = `${n} checks · ${conflicts} need attention`;
      summary.className = 'summary warn';
    } else {
      summary.textContent = `${n} checks ready · location: ${state.location === 'chatham' ? 'Chatham' : 'Dennis Port'}`;
      summary.className = 'summary';
    }
    document.getElementById('btnConfirmPrint').disabled = (n === 0 || conflicts > 0);
  }

  function queueConflictCheck() {
    if (state.conflictTimer) clearTimeout(state.conflictTimer);
    state.conflictTimer = setTimeout(runConflictCheck, 350);
  }

  async function runConflictCheck() {
    const sel = selectedItemsInOrder();
    const numbers = sel.map(it => state.modalNumbers[key(it)])
                        .filter(v => v && /^\d+$/.test(v))
                        .map(v => parseInt(v, 10));
    if (numbers.length === 0) {
      state.externalConflicts = {};
      renderChecksList();
      refreshModalSummary();
      return;
    }
    try {
      const r = await fetch('/api/print-queue/check-conflicts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          location: state.location,
          numbers,
          exclude_items: sel.map(it => ({ source: it.source, id: it.id })),
        }),
      });
      if (!r.ok) return;
      const data = await r.json();
      const map = {};
      for (const c of (data.conflicts || [])) {
        map[String(c.number)] = c;
      }
      state.externalConflicts = map;
      renderChecksList();
      refreshModalSummary();
    } catch (e) {
      // Non-fatal — POST will validate as backstop
    }
  }

  async function confirmPrint() {
    const sel = selectedItemsInOrder();
    if (sel.length === 0) return;

    // Build items with numbers
    const items = [];
    for (const it of sel) {
      const v = state.modalNumbers[key(it)];
      const n = parseInt(v, 10);
      if (!v || isNaN(n) || n <= 0) {
        modalStatus(`Invalid number for ${it.payee || it.source + '#' + it.id}.`, 'err');
        return;
      }
      items.push({ source: it.source, id: it.id, check_number: n });
    }

    document.getElementById('btnConfirmPrint').disabled = true;
    modalStatus('Generating PDF…');

    try {
      const r = await fetch('/api/print-queue/print', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ location: state.location, items }),
      });
      if (!r.ok) {
        let msg = `HTTP ${r.status}`;
        try {
          const j = await r.json();
          if (j.error) msg = j.error;
          if (j.conflicts && j.conflicts.length) {
            // Update external conflicts so UI reflects them
            const map = {};
            for (const c of j.conflicts) map[String(c.number)] = c;
            state.externalConflicts = { ...state.externalConflicts, ...map };
            renderChecksList();
            refreshModalSummary();
          }
        } catch (_) {}
        throw new Error(msg);
      }
      const blob = await r.blob();
      const url = URL.createObjectURL(blob);
      // Open inline in a new tab so the user can print without downloading.
      const w = window.open(url, '_blank');
      if (!w) {
        // Popup blocked — fall back to download so the file isn't lost.
        const a = document.createElement('a');
        a.href = url;
        const dispo = r.headers.get('Content-Disposition') || '';
        const m = dispo.match(/filename="?([^"]+)"?/i);
        a.download = (m && m[1]) || `checks_${state.location}.pdf`;
        document.body.appendChild(a);
        a.click();
        a.remove();
      }
      // Revoke after the new tab has had time to load the blob.
      setTimeout(() => URL.revokeObjectURL(url), 60000);

      state.selected.clear();
      closePrintModal();
      setStatus(`Printed ${items.length} ${items.length === 1 ? 'check' : 'checks'}. PDF downloaded.`, 'ok');
      loadQueue();
    } catch (e) {
      modalStatus('Print failed: ' + e.message, 'err');
      refreshModalSummary();  // re-enable button if conflicts cleared, etc.
    }
  }

  // ── Status helpers ──────────────────────────────────────────────────────────

  function setStatus(msg, type) {
    const box = document.getElementById('statusBox');
    if (!msg) { box.innerHTML = ''; return; }
    box.innerHTML = `<div class="status-msg ${type || ''}">${escapeHtml(msg)}</div>`;
    if (type === 'ok') setTimeout(() => { if (box.innerHTML.includes(msg)) box.innerHTML = ''; }, 5000);
  }
  function modalStatus(msg, type) {
    const box = document.getElementById('modalStatus');
    if (!msg) { box.innerHTML = ''; return; }
    box.innerHTML = `<div class="status-msg ${type || ''}">${escapeHtml(msg)}</div>`;
  }

  // Init
  if (typeof buildSidebar === 'function') buildSidebar();
  loadQueue();
</script>
</body>
</html>
